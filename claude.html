      "md": "**TL;DR** — MariaDB 10.6 LTS hits end-of-life *today* (2026-07-06) at the same moment a maximum-severity (CVSS 10.0) Galera RCE is making the rounds; if you run 10.6, patch to the final 10.6.27 and plan your migration. Otherwise a quiet transactional window: MySQL shipped its scheduled June security update and PostgreSQL core had no new minor.\n\n## Security / CVEs\n- **MariaDB CVE-2026-49261 — CVSS 10.0 RCE via Galera `wsrep_notify_cmd`.** A joiner node's name can carry embedded shell commands that execute on the server during SST notification. Only affects clusters that set `wsrep_notify_cmd` (not default). Patched in 10.6.27, 10.11.18, 11.4.12, 11.8.8, 12.3.2. No public exploitation reported, but it's now widely written up. [securityonline](https://securityonline.info/mariadb-security-flaw-cvss-10/) · [RHSA-2026:33481](https://access.redhat.com/errata/RHSA-2026:33481) · [MariaDB CVE list](https://mariadb.com/docs/server/security/cve/community-server)\n- **MySQL June security update (9.7.1 & 8.4.10, 2026-06-16).** Oracle's quarterly-style CPU for both LTS lines; server/InnoDB/client hardening. Apply on your normal patch cadence. [9.7.1 notes](https://dev.mysql.com/doc/relnotes/mysql/9.7/en/news-9-7-1.html) · [8.4.10 notes](https://dev.mysql.com/doc/relnotes/mysql/8.4/en/news-8-4-10.html)\n\n## Engine releases & lifecycle\n- **MySQL 9.7 is the first LTS since 8.4** (9.7.0 GA 2026-04-21; first patch 9.7.1 lands in-window). It moves several former Enterprise-only features into Community; native vector search is still being built out across 9.x, not fully usable here. Worth a compatibility eval if you're planning off 8.4. [Oracle blog](https://blogs.oracle.com/mysql/mysql-9-7-is-out-and-the-community-wins) · [InfoQ](https://www.infoq.com/news/2026/05/mysql-97-lts/)\n- **PostgreSQL core was quiet.** No new minor in the window; the current set remains the May 2026 release (18.4 / 17.10 / 16.14 / 15.18 / 14.23). Next scheduled minor is the August set. If you ady patched in the Feb/May sets.\n\n_Verification note: the egress policy blocked postgresql.org, endoflife.date, mariadb.com/.org and vendor docs (403), so exact dates/versions here were corroborated across multiple secondary sources and URL-embedded dates rather than confirmed on primary release pages. Treat distributed-SQL version/date specifics as lower-confidence._",

      "md": "**TL;DR** — A genuinely busy month for table formats: Apache Hudi 1.2 (Jun 7) added VECTOR/BLOB/VARIANT + Lance storage for multimodal, and Delta Lake 4.3.0 (Jun 22) routed all catalog-managed writes through Unity Catalog Delta APIs and made UniForm Iceberg metadata atomic. Catalogs kept consolidating (Polaris credential vending now spans Delta/Hudi/Paimon), while the ecosystem visibly sheds its JVM assumption (Iceberg C++ 0.3.0, Arrow/DataFusion Rust momentum). No new CVEs surfaced in this stack.\n\n## Table formats & specs\n- **Apache Hudi 1.2 (Jun 7)** — First-class VECTOR (with built-in similarity search), BLOB, and VARIANT types, plus Lance file-format integration for AI/multimodal workloads. Flink path got Record-Level-Index support, dynamic bucket scaling, and a FLIP-27 source for large streaming jobs. Hudi is explicitly pitching itself as the transactional home for vectors + analytics in one table. [announce](https://hudi.apache.org/blog/2026/06/07/apache-hudi-release-1-2-announcement/)\n- **Delta Lake 4.3.0 (Jun 22)** — Every operation on a catalog-managed table now flows through the new Unity Catalog Delta APIs (intent-based commits the catalog validates); Structured Streaming + Change Data Feed reach catalog-managed tables from Spark, including DV-aware `SELECT … CHANGES FROM VERSION/TIMESTAMP`. UniForm now writes Iceberg metadata atomically with the Delta commit and only re-converts the changed log range. Also fixes VARIANT-stat drops during UPDATE/MERGE with DVs enabled, and aligns geo/Variant specs. [release notes](https://github.com/delta-io/delta/issues/7034)\n- **Iceberg v3 in the wild** — v3 (deletion vectors, row lineage, VARIANT, geo/geography, nanosecond ts) is now GA on Snowflake (May 7) and supported across EMR 7.12 / Glue / S3 Tables; deletion vectors give O(1) delete lookups and up to ~10x faster DML vs v2 position deletes. Iceberg Java 1.11.0 (May 19, just outside the window) added server-side scan planning and envelope encryption. [AWS](https://aws.amazon.com/blogs/big-data/accelerate-data-lake-operations-with-apache-iceberg-v3-deletion-vectors-and-row-lineage/) · [Iceberg 1.11](https://opensource.googleblog.com/2026/05/announcing-apache-iceberg-1110.html)\n\n## Catalogs & the catalog war\n- **Apache Polaris 1.5 (early June) → 1.6 in the wings** — Credential vending extended beyond Iceberg to the Generic Table API via a new `Polaris-Generic-Table-Access-Delegation` header, so engines reading Delta/Hudi/Paimon through Polaris get short-lived vended storage creds instead of long-lived keys. Late-June community debate centered on non-Iceberg REST endpoints, runtime-activated datasources, and a catalog-resident semantic layer — the catalog becoming a control plane, not a table directory. [Snowflake](https://www.snowflake.com/en/blog/engineering/apache-polaris-1-5-release/) · [Dremio deep-dive](https://www.dremio.com/blog/apache-polaris-1-5-0-deep-dive-into-the-future-of-open-data-catalogs/)\n- **State-of-catalogs (June) picture** — Practical June 2026 guidance: S3 Tables for AWS-native, Polaris for vendor-neutral multi-cloud, Nessie for Git-style branch isolation/CI-CD, Gravitino as \"catalog of catalogs\" (unified RBAC, MCP server for agents), Lakekeeper for a small Rust single-binary REST catalog (multi-table commits, vended creds/remote signing, no JVM). [comparison](https://dev.to/alexmercedcoder/the-state-of-apache-iceberg-catalogs-in-june-2026-265e)\n\n## File formats & cross-language interop\n- **The JVM is leaving the building** — Late June alone brought Iceberg C++ v0.3.0, Arrow Rust Object Store 0.14.0, and a DataFusion Comet 0.17.0 release vote. Arrow C++ surfaced duplicate Variant implementations, underscoring that a cross-format Variant type needs cross-project alignment (Parquet/Arrow/Iceberg) rather than three drifting copies — iceberg-cpp needs Variant for v3. [weekly](https://dev.to/alexmercedcoder/apache-data-lakehouse-weekly-june-17-to-june-24-2026-3hen)\n- **Parquet Variant + geospatial hardening** — Parquet's native geospatial types now span Parquet-Java, Arrow C++, Rust, hyparquet (JS), and DuckDB; the Variant type add had its latest release May 13. Spec work in-window covered global snapshot consistency, primary keys, NaN ordering, and INT96 timestamps. [Parquet geo](https://parquet.apache.org/blog/2026/02/13/native-geospatial-types-in-apache-parquet/)\n\n## CDC & ingestion\n- **CDC was quiet in-window; the reference release is Flink CDC 3.6.0 (Mar 30)** — Worth knowing if you run it: adds PostgreSQL schema evolution, new Oracle source + Apache Hudi sink pipeline connectors, and VARIANT/`PARSE_JSON` in the pipeline. Debezium 3.6.0.Alpha2 (May 15) is still alpha. Reminder that stock Debezium is at-least-once — dedup lives with the consumer, and turning on exactly-once carries real latency cost. [Flink CDC 3.6](https://flink.apache.org/2026/03/30/apache-flink-cdc-3.6.0-release-announcement/)\n\n## Worth your weekend\n- **Delta 4.3's catalog-managed commit model** — If you're standardizing on Unity Catalog OSS, the Delta APIs change how concurrency/validation work at the commit layer; read the mechanics before you assume old direct-to-storage commit paths still apply. [Delta 4.3](https://github.com/delta-io/delta/issues/7034)\n- **DuckLake as a foil** — DuckLake 1.0 (April) puts all metadata in a SQL catalog DB with Iceberg-compatible deletion vectors and data inlining for small writes; v1.1 (targeting Sept) adds Variant inlining and multi-DV Puffin files. Useful contrast to the Iceberg/Delta metadata-in-object-store model. [DuckLake 1.0](https://ducklake.select/2026/04/13/ducklake-10/)\n\n## Heads up\n- **UniForm/XTable still don't cover Paimon** — Cross-format interop (Delta UniForm, Apache XTable) spans Iceberg/Delta/Hudi but not Paimon; don't assume write-once/read-anywhere reaches every format. Validate the interop matrix for your engines rather than trusting the marketing. [XTable](https://xtable.apache.org/)\n- **Variant fragmentation risk** — Three-project Variant implementations (Parquet/Arrow/Iceberg-cpp) risk semantic drift; if you depend on VARIANT round-tripping across engines today, pin versions and test, don't assume spec parity yet.\n\n## Signals worth watching\n- Polaris 1.6.0 and the debate over non-Iceberg REST endpoints + a catalog-native semantic layer — the \"catalog as control plane for agents/BI/engines\" thesis.\n- Hudi's Lance integration + native vectors: the table format vs. vector-DB boundary is blurring.\n- Client-lib cadence: iceberg-rust 0.9.0 (Jan–Mar), pyiceberg-core 0.9.1 (May 6), plus a push to catalog production iceberg-rust usage — the Rust stack is nearing \"boring enough for prod.\"\n\n## Filtered out\n- Generic Fivetran/Airbyte/Estuary \"best ETL tool 2026\" listicles — no concrete in-window releases, mostly comparison SEO.\n- Iceberg v3 keynote/vendor-preview reposts (Databricks/Google/AWS) already covered by primary AWS/Snowflake GA docs.\n- CVE noise: broad CISA/GHSA bulletins from June had no Iceberg/Delta/Hudi/Parquet/Debezium entries — nothing actionable for this stack this window.",

      "md": "**TL;DR** — Quiet month for on-prem DB security (June CSPU carried no core-DB CVEs; next quarterly CPU lands ~July 21), but Autonomous AI Database Serverless shipped real, dated features (Data Science Agent, Database@AWS GA, built-in MCP Server), and Exadata pushed its routine June maintenance train (25.2.11 / 25.1.18) alongside the newer 26ai/26.1 line.\n\n## Autonomous AI Database\n- **Serverless: Oracle Data Science Agent (June 30, 2026)** — Guided chat in Oracle Machine Learning that profiles data, engineers features, trains/evaluates models and generates inference SQL, supported on ADB Serverless 26ai. [source](https://docs.oracle.com/en-us/iaas/releasenotes/autonomous-database-serverless/2026-06-data-science-agent.htm)\n- **Serverless: ADB-S GA on Oracle Database@AWS (June 10, 2026)** — Fully managed ADB Serverless on Exadata now provisionable from the AWS Console (US East/N. Virginia, US West/Oregon), billable against AWS commit, supporting 26ai and 19c. [source](https://aws.amazon.com/about-aws/whats-new/2026/06/oracle-database-aws-autonomous-database-serverless/)\n- **Serverless: built-in MCP Server GA** — Managed, per-database Model Context Protocol endpoint (multi-tenant, no setup) exposing Select AI Agent tools to clients like Claude Desktop/OCI AI Agent, with DB-enforced auth via Oracle Database Identity; supports 19c and 26ai. [source](https://blogs.oracle.com/machinelearning/announcing-the-oracle-autonomous-ai-database-mcp-server)\n- **Serverless: APEX upgraded to 24.2** — ADB Serverless (including APEX Service) instances moved to Oracle APEX 24.2. [source](https://docs.oracle.com/en-us/iaas/autonomous-database-serverless/doc/whats-new-adwc.html)\n- **Dedicated: new admin + KMS controls** — Additional administrative controls for maintenance/recovery operations, plus support for AWS KMS customer-managed keys with cross-region Data Guard/DR on Dedicated Exadata Infrastructure. [source](https://docs.oracle.com/en/cloud/paas/autonomous-database/dedicated/adbaa/new-feature-announcements.html)\n\n## Performance\n- **Exadata System Software 26ai / 26.1** — Current major Exadata train (successor to 25.2), positioned around availability, resilience and infrastructure-utilization gains for at-scale DB workloads; the headline perf/agility features live here rather than in the maintenance releases. Confirm exact GA timing before planning. [source](https://blogs.oracle.com/exadata/exadata261)\n- **AI Vector Search under the hood (context, not new-in-window)** — 26ai's HNSW/IVF story continues to mature: DML support on HNSW-indexed tables with transactionally consistent, read-snapshot results (including RAC where HNSW is duplicated per instance), plus binary/sparse vectors claiming up to 32x lower storage and 40x faster distance calc vs float. Useful background if you're sizing vector workloads; no major new optimizer/CBO or In-Memory blog dropped inside the 30-day window. [source](https://docs.oracle.com/en/database/oracle/oracle-database/26/nfcoa/vector-indexes.html)\n\n## Patches & Releases\n- **Exadata System Software June 2026 updates — 25.2.11 and 25.1.18** — Maintenance releases (critical bug + security fixes, latest Ksplice Uptrack for OL7/OL8) on top of the 25.2.x and 25.1.x lines; recommended for all systems. [source](https://blogs.oracle.com/exadata/software-2026-jun)\n- **Tooling refresh (June 2026)** — AutoUpgrade 26.3, Autonomous Health Framework (AHF) 26.3.1, ODA 19.31, and Data Pump recommended proactive patches per the coretec monthly roundup. [source](https://blogs.oracle.com/coretec/oracle-database-monthly-news-june-2026-quick-links)\n- **Release-numbering reminder** — \"Oracle AI Database 26ai\" is the current brand; RUs read 23.26.x (e.g., April = 23.26.2 / 19.31). The July quarterly RU (23.26.3 / 19.32) is due mid-month. [source](https://mikedietrichde.com/2025/10/14/oracle-ai-database-26ai-replaces-oracle-database-23ai/)\n\n## CPU / CVE\n- **June 2026 CSPU — no core Database/Exadata/GoldenGate CVEs** — The monthly Critical Security Patch Update (~245 fixes) covered Middleware, EBS, MySQL, PeopleSoft, Siebel, etc., but did not list core DB. Note the newer monthly CSPU cadence (started May 2026) runs alongside the quarterly CPU. [source](https://www.oracle.com/security-alerts/cspujun2026.html)\n- **MySQL flagged (patched)** — June CSPU includes MySQL Server CVE-2026-46860 (CVSS 9.8) and CVE-2026-46861 (CVSS 9.6); relevant if you run MySQL/HeatWave. Fixed in the June CSPU; no evidence of active exploitation. [source](https://www.oracle.com/security-alerts/cspujun2026.html)\n\n## Heads up\n- **July 2026 quarterly CPU ~July 21** — Third-Tuesday quarterly Critical Patch Update lands just outside this window; this is the release Oracle flagged as its first quarterly cut after re-testing with new AI models, so plan promptly. Watch oracle.com/security-alerts. [source](https://www.oracle.com/security-alerts/)\n- **DBMS_OPTIM_BUNDLE / Fix-Control Persistence** — Dietrich's late-May guidance still worth acting on: test optimizer fix-controls during upgrade testing and persist them deliberately, to avoid plan surprises when applying RUs. [source](https://mikedietrichde.com/)\n\n## Signals worth watching\n- **Oracle Database@AWS momentum** — ADB-S GA on AWS (and cross-region KMS on Dedicated) signals multicloud DR/key-management becoming table stakes; expect region expansion beyond N. Virginia/Oregon.\n- **Agentic/AI-in-DB surface area** — Data Science Agent + built-in MCP Server mean AI agents can now hit ADB directly under DB-enforced auth; review audit/perf controls and Select AI profile governance before enabling.\n\n## Filtered out\n- Generic \"why Oracle gets slow / performance tuning best practices\" SEO blogs (pinnacledigitech, croyanttech, learnomate, devart) — no dated, engineer-actionable content.\n- Undated evergreen Exadata Smart Scan explainers and vendor vector-DB marketing.",

      "md": "**TL;DR** — A quiet-but-consequential 30 days for Snowflake: the June weekly releases (10.21/10.22) GA'd Dynamic Tables and insert-only streams on Delta Direct tables, warehouse economics keep shifting as Gen2-by-default and QAS-enabled-by-default land, and the 2026_05 behavior-change bundle is slated to flip to enabled-by-default in July. Nothing urgent; the one recent CVE (Cortex Code CLI RCE) is auto-patched and not known-exploited.\n\n## Releases & behavior-change bundles\n- **10.22 (Jun 20–25): Dynamic Tables and insert-only Streams on Delta Direct tables reach GA** — You can now build Dynamic Tables directly on Delta Direct (Iceberg-on-Delta) tables and attach insert-only streams, closing a gap for lakehouse CDC pipelines that land Delta files. [release notes](https://docs.snowflake.com/en/release-notes/2026/10_22)\n- **10.21 (Jun 12–18): DMF FILTER clause** — Data metric functions can now be scoped to a row subset via a FILTER clause when associated with a table/view, a small but useful governance/quality-monitoring refinement. [release notes](https://docs.snowflake.com/en/release-notes/2026/10_21)\n- **2026_05 bundle slated to flip to enabled-by-default in July** — Still disabled-by-default as of early July; admins should test in non-prod now via `SYSTEM$ENABLE_BEHAVIOR_CHANGE_BUNDLE` before the opt-out window opens. Confirm the exact date against the bundle page. [2026_05 bundle](https://docs.snowflake.com/en/release-notes/bcr-bundles/2026_05_bundle) · [behavior changes](https://docs.snowflake.com/en/release-notes/behavior-changes)\n\n## Warehouse performance & credit cost\n- **Gen2 is now the default standard-warehouse generation (2026_03 bundle, generally enabled)** — In regions where Gen2 is available, `CREATE WAREHOUSE` without a GENERATION clause yields Gen2. Gen2 is GA across AWS/Azure/GCP (multicloud GA landed May 14). Watch per-credit rates: Gen2 carries a higher credit multiplier than Gen1 in exchange for faster analytics/DML, so validate net cost per workload. [Gen2 default BCR](https://docs.snowflake.com/en/release-notes/bcr-bundles/2026_03/bcr-2250) · [multicloud GA blog](https://www.snowflake.com/en/blog/engineering/gen2-warehouses-snowflake-multicloud-ga/)\n- **Query Acceleration Service (QAS) now enabled by default on new Gen2 and multi-cluster warehouses** — Default max scale factor of 2; QAS bursts eligible scans onto serverless compute (billed separately). Great for spiky scan-heavy queries, but it can add serverless credits silently — monitor `QUERY_ACCELERATION_ELIGIBLE` and set `QUERY_ACCELERATION_MAX_SCALE_FACTOR` deliberately. Single-cluster Gen1 remains off by default. [QAS enabled-by-default blog](https://www.snowflake.com/en/blog/engineering/query-acceleration-service-enabled-by-default/) · [BCR-2269](https://docs.snowflake.com/en/release-notes/bcr-bundles/2026_03/bcr-2269)\n- **Adaptive Warehouses / Adaptive Compute: public preview, \"GA soon\"** — Snowflake's auto-sizing/auto-routing compute (no size/multi-cluster/auto-suspend config) was headlined at Summit as approaching GA. Independent TPCH-1000 benchmarking shows Adaptive beating Gen1 (~47% faster across 22 queries) at similar cost to Gen2, but routing behavior is opaque — treat cost predictions cautiously until GA. [docs](https://docs.snowflake.com/en/user-guide/warehouses-adaptive) · [independent benchmark](https://medium.com/@masato.takada/benchmarking-snowflakes-adaptive-warehouses-gen1-vs-gen2-vs-adaptive-on-tpch-1000-c2538211486d)\n\n## Iceberg / Polaris\n- **Snowflake-managed Iceberg storage + external-engine writes (GA, early June)** — Snowflake now stores/manages the Parquet + metadata for Iceberg tables without an external volume/IAM grant, and external Spark/Trino can write to Snowflake-managed Iceberg tables via Polaris-implemented open REST APIs with Snowflake governance applied. (Deep format mechanics deferred to the formats brief.) [analysis](https://seifert.substack.com/p/snowflake-iceberg-in-2026-open-format)\n\n## Cortex / AI\n- **Cortex Sense entering private preview (~mid-July)** — A context layer that lets Cortex agents lean on metadata, query history, and semantic views for more accurate grounding; positioned alongside Cortex Analyst/Search/Agents. Preview, so not yet dependable for production. [blog](https://www.snowflake.com/en/blog/enterprise-ai-agents-grounded-context/)\n\n## Security & auth\n- **CVE-2026-6442 — Cortex Code CLI sandbox-escape RCE, CVSS 8.3 (High), patched in 1.0.25** — Improper bash-command validation let crafted content (e.g., a malicious repo) run commands outside the CLI sandbox. Fix auto-applies on relaunch; exploitation is non-deterministic/model-dependent and there's no report of active exploitation. Ensure Cortex Code CLI ≥ 1.0.25. (Bulletin published Apr 16, so context rather than fresh news.) [advisory](https://github.com/advisories/GHSA-26fh-vcwc-mcgv)\n- **MFA / strong-auth enforcement ramping through Q3/Q4** — Newly created users are being enforced May–Jul 2026; existing users Aug–Oct 2026. Service users must move to key-pair/OAuth/PAT/WIF (LEGACY_SERVICE deprecated). No 14-day cliff, but audit service accounts now. [rollout docs](https://docs.snowflake.com/en/user-guide/security-mfa-rollout)\n\n## Worth your weekend\n- Independent Gen1 vs Gen2 vs Adaptive TPCH-1000 benchmark — useful ground truth before you migrate warehouses. [Medium](https://medium.com/@masato.takada/benchmarking-snowflakes-adaptive-warehouses-gen1-vs-gen2-vs-adaptive-on-tpch-1000-c2538211486d)\n- Summit 26 (Jun 1–4) recaps for the full roadmap picture (Adaptive Compute, Iceberg V3, Cortex training). [Flexera recap](https://www.flexera.com/blog/perspectives/snowflake-summit-2026/)\n\n## Heads up\n- **Gen2-by-default + QAS-by-default = shifting credit profile.** New warehouses created without explicit GENERATION/QAS settings will behave and bill differently than your Gen1 baselines. Pin generation and QAS settings in IaC/templates if you want cost stability.\n- **2026_05 bundle opt-out window opening in July** — test now.\n\n## Signals worth watching\n- Adaptive Compute GA date and its real-world credit behavior (routing opacity is the open question).\n- Cortex Sense preview quality once it opens up.\n- Whether QAS-by-default produces surprise serverless credit lines in July invoices.\n\n## Filtered out\n- Deep Iceberg V3 / format-spec mechanics — deferred to the data-formats brief.\n- Marketing-heavy Summit 26 \"agentic enterprise\" recaps with no shipping artifact.",

      "md": "**TL;DR** — Data + AI Summit (June 15–18) dominated the month: DBR 19 Beta on Spark 4.2, Managed Iceberg + Iceberg v3 GA in Unity Catalog, Lakehouse//RT beta for sub-100ms serving, Vector Search rebranded to AI Search, and Delta 4.3 OSS. The one thing on your calendar: Genie moves to pay-as-you-go DBU billing **today, July 6**, with a 150-DBU/user free tier — and service principals get zero free allowance.\n\n## Runtime, Spark & Delta OSS\n- **Databricks Runtime 19 Beta ships on Spark 4.2.0, JDK 21 only** — New SQL surface: `is_valid_variant()`, `INSERT INTO ... REPLACE ON/USING` (upsert-style), DSv2 catalog transactions for atomic multi-table writes, and batch CDC net-change post-processing. Watermark behavior change: in real-time-mode streaming, records whose event time equals the current watermark are now retained (delay shifted +1ms), where they were previously dropped as late — retest RTM streaming jobs. JDK-21-only is the migration gotcha. [DBR 19 notes](https://docs.databricks.com/aws/en/release-notes/runtime/19)\n- **Delta Lake 4.3.0 (OSS, June 22)** — Built on Spark 4.1.0/4.0.1. Adds the UC Delta API (Unity Catalog as source of truth for managed Delta with server-side commit validation), `replaceUsing`/`replaceOn` selective data replacement, and Structured Streaming + CDF for catalog-managed tables. UniForm now writes Iceberg metadata atomically with the Delta commit and converts only the changed log range. [Delta 4.3 blog](https://delta.io/blog/2026-06-22-delta-4-3-release/)\n- **Async file flushing default on classic compute (DBR 17.1+)** — Workspace file writes/deletes/metadata ops now batch and flush in the background by default, cutting latency for many-small-file and Git workloads. [June 2026 platform notes](https://docs.databricks.com/aws/en/release-notes/product/2026/june)\n\n## Performance & optimization\n- **Lakehouse//RT enters Beta — millisecond serving on governed tables** — New \"Reyden\" engine targets operational analytics/app serving/agents directly on Delta and Iceberg under Unity Catalog, no separate serving stack or CDC sync. Databricks claims sub-100ms at 12,000 QPS and up to 16x vs existing real-time stacks (vendor benchmark — treat as non-independent). Beta only. [Lakehouse//RT blog](https://www.databricks.com/blog/introducing-lakehousert-real-time-performance-unified-lakehouse)\n- **Predictive Optimization default rollout completing ~August 2026** — Already default for accounts created after 2024-11-11; existing accounts are being enabled gradually. Automatic Liquid Clustering (`CLUSTER BY AUTO`) depends on PO for key selection and now runs async, cost-gating whether to (re)cluster. Liquid Clustering remains the recommended default over Z-order/partitioning for new tables. [Predictive Optimization docs](https://docs.databricks.com/aws/en/optimizations/predictive-optimization)\n\n## Delta / Iceberg interop\n- **Managed Iceberg GA + Iceberg v3 GA in Unity Catalog** — You can create/read/write/optimize/govern/share Iceberg tables natively in UC, with Predictive Optimization and Liquid Clustering applied automatically and open-API access for any engine. UniForm's atomic, incremental Iceberg metadata write (Delta 4.3) is the OSS underpinning. Deeper format mechanics deferred to the formats brief. [UC Iceberg blog](https://www.databricks.com/blog/unity-catalog-and-next-era-apache-icebergtm)\n\n## Data engineering & ingestion\n- **Lakeflow Connect expands past 100 connectors** — ServiceNow and Google Analytics now GA; Confluence GA; Jira, GitHub, SharePoint, Google Drive, and Outlook in Beta. Managed CDC database connectors cover MySQL/PostgreSQL/SQL Server, governed by UC on serverless. [Lakeflow Connect](https://docs.databricks.com/aws/en/ingestion/lakeflow-connect/)\n\n## Unity Catalog & governance\n- **Unity Catalog Metrics, external lineage GA, Catalog Federation** — Metrics is open-sourced in Apache Spark + UC OSS (Open Semantic Interchange-ready). External lineage is GA (register upstream sources and downstream BI). New federation connectors and cross-engine ABAC. Discover page (curated asset browsing) and metastore-level access requests entered Public Preview. [UC at DAIS 2026](https://www.databricks.com/blog/whats-new-unity-catalog-data-ai-summit-2026)\n- **Unity AI Gateway for agent/model governance** — Adds LLM-based guardrails (policy-as-prompt vs fixed filters), spend caps, smart routing, and observability across models/MCP/agents; this is also the control plane behind Genie budgets. [Unity AI Gateway](https://www.databricks.com/blog/ai-governance-data-ai-summit-2026-whats-new-unity-ai-gateway)\n- **Delta Sharing across regulatory domains** — D2D sharing now spans commercial ↔ AWS GovCloud/GovCloud DoD/Azure China; \"OpenSharing\" extends the protocol to models, agent skills, and unstructured data. [June 2026 platform notes](https://docs.databricks.com/aws/en/release-notes/product/2026/june)\n\n## Mosaic AI\n- **Vector Search → \"AI Search\"** — Rename plus real product changes: full-text/keyword search (Beta) on any endpoint, dedicated full-text indexes (Beta) on storage-optimized endpoints, and hybrid ANN+keyword with rerank. SDK moves from `databricks-vectorsearch` to `databricks-ai-search` — update imports. [AI Search docs](https://docs.databricks.com/aws/en/ai-search/ai-search)\n- **Claude Sonnet 5 as a Databricks-hosted model** — Available in Model Serving for coding/agentic workloads. [June 2026 notes](https://docs.databricks.com/aws/en/release-notes/product/2026/june)\n\n## Lakebase & operational\n- **Lakebase (managed serverless Postgres) GA continues to expand** — AWS GA (Feb) and Azure GA (Mar, 14 regions) predate the window, but Autoscaling now supports Postgres 18 (Postgres 17 remains default), with pgvector for AI search. [Lakebase GA blog](https://www.databricks.com/blog/databricks-lakebase-generally-available)\n\n## Pricing\n- **Genie moves to pay-as-you-go DBU billing TODAY (July 6)** — Each identified *user* gets 150 free LLM DBUs/month (~$10.50 US-East, roughly 80–100 questions or 20–30 Genie Code sessions); overage bills per DBU. Critical gotcha: **service principals get no free allowance** — automated Genie calls bill from the first request. Set budgets via Unity AI Gateway now. [Genie pricing analysis](https://medium.com/towards-data-engineering/databricks-genie-pricing-what-actually-changes-in-july-2026-0f3558f26d61) · [Genie budgets docs](https://docs.databricks.com/aws/en/genie/budgets)\n\n## Worth your weekend\n- The DBR 19 RTM streaming watermark change (equal-to-watermark records now retained) is subtle enough to alter output counts — worth reading the [runtime notes](https://docs.databricks.com/aws/en/release-notes/runtime/19) before you upgrade streaming jobs.\n- Delta 4.3's UC Delta API points at a future where Spark/Flink/Trino all commit through Unity Catalog with server-side validation — [worth understanding the direction](https://delta.io/blog/2026-06-22-delta-4-3-release/).\n\n## Heads up\n- **Genie billing flips today** — audit any service-principal-driven Genie/Genie Code automation before it silently accrues DBUs; set account/workspace budgets.\n- **Predictive Optimization auto-enablement** finishing by ~August will start running OPTIMIZE/VACUUM/ANALYZE on serverless for existing accounts — expect new serverless line items even if you never opted in. [PO docs](https://docs.databricks.com/aws/en/optimizations/predictive-optimization)\n- **DBR 19 is JDK 21 only** — pin any JVM/UDF/library dependencies still on JDK 17 before testing.\n\n## Signals worth watching\n- Lakehouse//RT / Reyden (Beta) blurs the line between the lakehouse and a serving DB — watch for independent latency benchmarks vs the vendor 16x claim.\n- AI Search full-text and hybrid features are still Beta; the SDK rename will break pipelines that pin the old package.\n- Upcoming FedRAMP High on Azure Commercial and expanded GovCloud AI coverage signal a regulated-workload push. [Security at DAIS 2026](https://www.databricks.com/blog/whats-new-databricks-platform-security-and-compliance-data-ai-summit-2026)\n\n## Filtered out\n- No new actively-exploited or unpatched Databricks CVEs surfaced in the window. A previously reported audit-log session-token exposure (BeyondTrust) was already patched (tokens now redacted); the older SEC Consult cluster-isolation advisory is not new. No urgent security action.\n- Agent Bricks / Omnigent / Genie One / Genie Ontology agent launches noted but out of the performance-engineering lens.\n- Deep Delta/Iceberg on-disk format mechanics deferred to the formats brief.",

      "md": "**TL;DR** — A quiet-but-dense 30 days on the BigQuery release notes: the big theme is autonomous/agentic AI in-warehouse (embedding generation and continuous queries hit GA, plus new preview vector/token functions and Python UDF performance work), while the operationally important item is a hard change on **June 1**: legacy SQL is now locked out for orgs that hadn't used it in the prior 7 months. No urgent CVE for stacks you run.\n\n## Engine, performance & optimization\n- **Vectorized Python UDFs via Apache Arrow RecordBatch** — You can now write Python UDFs that receive batches as PyArrow `RecordBatch` (tune with `max_batching_rows`), reportedly up to ~10x faster than row-by-row for compute-heavy work. Python UDFs also now export CPU/memory/concurrency metrics to Cloud Monitoring, and a new `container_request_concurrency` option on `CREATE FUNCTION` caps concurrent requests per container. [release notes](https://docs.cloud.google.com/bigquery/docs/release-notes) · [Python UDF docs](https://docs.cloud.google.com/bigquery/docs/user-defined-functions-python)\n- **Gemini Cloud Assist query optimization (Preview, editions only)** — Gemini can now analyze your SQL and recommend performance fixes (e.g., partitioned-table suggestions), and is available inside Jobs explorer / Job details / Capacity management to troubleshoot slow jobs. Requires BigQuery editions, not on-demand. [docs](https://docs.cloud.google.com/bigquery/docs/use-cloud-assist)\n- **Materialized views over CDC-enabled tables** — You can now build materialized views on top of tables with active change data capture, closing a long-standing gap for streaming/reverse-ETL pipelines that want incremental aggregates. [MV docs](https://docs.cloud.google.com/bigquery/docs/materialized-views-intro)\n\n## AI in the warehouse (BQML / Gemini)\n- **Autonomous embedding generation — GA** — Declare an embedding column on a table via `CREATE/ALTER TABLE` and BigQuery keeps it (and the vector index) in sync automatically as source rows change — no manual embedding pipeline. [docs](https://docs.cloud.google.com/bigquery/docs/autonomous-embedding-generation) · [blog](https://cloud.google.com/blog/products/data-analytics/introducing-bigquery-autonomous-embedding-generation)\n- **Vector search improvements** — New `VECTOR_INDEX.STATISTICS` function reports how far indexed data has drifted, and `ALTER VECTOR INDEX REBUILD` rebuilds without downtime. A new alternate `VECTOR_SEARCH` syntax (Preview) speeds up single-vector lookups; hybrid (semantic + full-text) search is in Preview. [release notes](https://docs.cloud.google.com/bigquery/docs/release-notes)\n- **New AI functions (Preview)** — `AI.AGG()` runs natural-language summarize/synthesize over millions of unstructured/multimodal rows in one line of SQL; `AI.COUNT_TOKENS` estimates token counts, and gen-AI functions can now report input/output/thought/cache token counts per modality — useful for cost estimation before running large jobs. [AI.AGG blog](https://cloud.google.com/blog/products/data-analytics/deep-dive-into-bigquery-ai-agg-function)\n- **TimesFM forecasting from Connected Sheets — GA** — Pre-trained TimesFM models (`AI.FORECAST`, `AI.DETECT_ANOMALIES`) are now usable directly from Connected Sheets, no SQL/Python required. [docs](https://docs.cloud.google.com/bigquery/docs/timesfm-model)\n\n## Streaming, CDC & real-time\n- **SQL-based continuous queries — GA** — Continuously-processing SQL for transform/reverse-ETL as events arrive; now supports slot autoscaling, Cloud Monitoring, cross-cloud exports, and streaming to **Spanner** in real time (GA). [docs](https://docs.cloud.google.com/bigquery/docs/continuous-queries-introduction)\n- **Real-time replication into BigQuery — GA** — Instant replication from Spanner, AlloyDB, and Cloud SQL into BigQuery tables. Plus a new **Pipelines & Connections** page (Preview) with guided setup for Data Transfer Service, Datastream, and Pub/Sub. [what's new](https://cloud.google.com/blog/products/data-analytics/whats-new-with-google-data-cloud)\n\n## Storage & open formats (see formats brief for depth)\n- **Managed Apache Iceberg tables — GA advanced runtime** — Automatic table management, Iceberg partitioning/clustering, multi-table transactions, CDC, enhanced vectorization, and history-based optimization are GA for BigQuery-managed Iceberg tables. Note the rename: **BigLake → \"Lakehouse for Apache Iceberg\"**, and BigLake metastore → **Lakehouse runtime catalog** (effective ~April 20, 2026). [interoperability blog](https://cloud.google.com/blog/products/data-analytics/improved-interoperability-for-your-apache-iceberg-lakehouse) · [docs](https://docs.cloud.google.com/bigquery/docs/biglake-iceberg-tables-in-bigquery)\n\n## Studio & graph\n- **BigQuery Graph query & schema visualization in Studio (Preview)** — Visualize graph query results and schemas directly in Studio without a notebook; BigQuery Graph analytics itself is in Preview. [what's new](https://cloud.google.com/blog/products/data-analytics/whats-new-with-google-data-cloud)\n\n## Heads up\n- **Legacy SQL locked out (effective June 1, 2026)** — If an org/project did **not** run legacy SQL between Nov 1, 2025 and June 1, 2026, it can no longer use legacy SQL at all. Verify any lingering legacy-SQL jobs/scheduled queries migrated to GoogleSQL. [release notes](https://docs.cloud.google.com/bigquery/docs/release-notes)\n- **Data Transfer Service backfill cap (June 1, 2026)** — Google Ads, Search Ads 360, and GA4 connectors now reject backfills older than 37 months (Google Ads/Analytics retention policy). [transfer changes](https://docs.cloud.google.com/bigquery/docs/transfer-changes)\n- **BigQuery Studio: Table Explorer moving to the Reference panel** — UI change landing July 2026 or later; adjust any workflow docs/training. [release notes](https://docs.cloud.google.com/bigquery/docs/release-notes)\n- **Scheduled connector schema changes** — DTS billing label case changes (`DATA_TRANSFER_SERVICE` → `data_transfer_service`) on **Aug 11, 2026**; Facebook Ads `ActionValue` field type changes INT→FLOAT on **July 25, 2026**. Both can break brittle downstream parsing/cost reports. [transfer changes](https://docs.cloud.google.com/bigquery/docs/transfer-changes)\n\n## Signals worth watching\n- **Reservation defaults tightening** — New admin projects created after April 1, 2026 default to reservation-based fairness for idle-slot distribution, and the new-reservation UI default is \"Most predictable\" (bounded baseline+borrow+autoscale cap). Not new this window, but the fairness/idle-sharing behavior is the current default your capacity planning should assume. [autoscaling analysis](https://followrabbit.ai/blog/bigquery-idle-slot-sharing-what-the-april-2026-default-change-means)\n- **Client tooling cadence** — `dbt-bigquery` 1.11.3 (Jun 24, 2026) and `bigframes` 2.43.0 (Jun 15, 2026) shipped; bigframes is increasingly the sanctioned path for Python models in dbt. [dbt-bigquery releases](https://github.com/dbt-labs/dbt-bigquery/releases) · [bigframes PyPI](https://pypi.org/project/bigframes/)\n\n## Filtered out\n- **CVE-2026-3259** (BigQuery materialized-view refresh information disclosure) — patched server-side by Google Jan 29, 2026; no customer action, outside the window. Not a live risk. [advisory](https://www.sentinelone.com/vulnerability-database/cve-2026-3259/)\n- **CVE-2026-23529** — arbitrary file read in the third-party Aiven BigQuery Sink Kafka connector, CVSS 3.0 (low); only relevant if you run that connector. [advisory](https://github.com/Aiven-Open/bigquery-connector-for-apache-kafka/security/advisories/GHSA-3mg8-2g53-5gj4)\n- AI.GENERATE / AI.GENERATE_TABLE GA and much of the Iceberg-management GA landed earlier in 2026 (pre-window); included above only as context.",

      "md": "**TL;DR** — A quiet 30 days for the engine itself: the headline items are Graviton RG instances reaching three more regions and cheaper incremental manual-snapshot billing for Serverless/RG, plus a data-sharing/multi-warehouse feature drop. Patch your Redshift JDBC and Python drivers (two recent RCE CVEs), and note Python UDFs hit end-of-support June 30.\n\n## Releases & instances\n- **RG (Graviton) instances expand to 3 more regions** — The RA3 successor — custom vectorized engine, integrated data-lake query, ~2.4x faster than RA3 at ~30% lower $/vCPU, and no Spectrum per-TB scan charges — added Africa (Cape Town), Asia Pacific (Bangkok), and Mexico (Central). Still only rg.xlarge/rg.4xlarge; more sizes promised later in 2026. If you're on RA3, this is the migration target to price-check. [what's-new](https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-redshift-rg-instances-3-additional-regions/) · [AWS News blog](https://aws.amazon.com/blogs/aws/amazon-redshift-introduces-aws-graviton-based-rg-instances-with-an-integrated-data-lake-query-engine/)\n\n## Storage & cost\n- **Incremental manual-snapshot billing for Serverless & RG** — Manual snapshot storage is now metered on *unique* data blocks across snapshots rather than each snapshot's full size, so keeping many manual snapshots (DR, testing, long retention) costs less and you can snapshot more often without proportional cost. Applies to Serverless and RG only. [what's-new](https://aws.amazon.com/about-aws/whats-new/2026/06/amazon-redshift-incremental-manual-snapshots/)\n\n## Data sharing & MVs\n- **Multi-warehouse enhancements: remote MVs and remote DDL** — Consumer warehouses can now refresh MVs created on a producer and stack MVs on data-shared MVs (full producer/consumer MV parity); `ALTER TABLE ALTER DISTSTYLE` works on remote warehouses via concurrency scaling; and `CREATE MATERIALIZED VIEW` is now classed as a user workload so concurrency scaling can offload MV builds under contention. Useful if you run a producer/consumer data-sharing topology. [Big Data blog (June 29)](https://aws.amazon.com/blogs/big-data/scale-analytics-with-amazon-redshift-multi-warehouse-enhancements/)\n\n## Heads up\n- **Python UDFs reached end of support June 30, 2026** — Deadline has now passed; existing Python UDFs may stop functioning. New Python UDF creation was already blocked at Patch 198. Migrate to Lambda UDFs (new `SYS_LUDF_DETAIL` view aids observability). [AWS blog](https://aws.amazon.com/blogs/big-data/amazon-redshift-python-user-defined-functions-will-reach-end-of-support-after-june-30-2026/)\n- **CVE-2026-8178 — RCE in Redshift JDBC driver (CVSS 8.1)** — Unsafe class loading from connection-URL params can execute code in your app's JVM if an attacker influences the JDBC URL. Fixed in driver **2.2.2**; upgrade any app or BI tool bundling an older Redshift JDBC jar. Published May 8, just outside the window but patch now. [AWS bulletin](https://aws.amazon.com/security/security-bulletins/2026-028-aws/) · [GHSA](https://github.com/aws/amazon-redshift-jdbc-driver/security/advisories/GHSA-wmmv-vvg5-993q)\n- **CVE-2026-8838 — RCE in redshift_connector (Python)** — `eval()` on server-returned vector data in `vector_in()` allows a rogue/MITM server to run arbitrary code on the client from a single crafted row. Fixed in **2.1.14** (PyPI). Anyone using the Python driver, especially over untrusted networks, should pin ≥2.1.14. [GitLab advisory](https://advisories.gitlab.com/pypi/redshift_connector/CVE-2026-8838/)\n\n## Signals worth watching\n- **RG as the RA3 endgame** — Regional rollout is steadily filling in; watch for larger RG sizes and any RA3 price/positioning changes as AWS pushes the Graviton line.\n- **MV auto-refresh as user queries** — Since Feb 27, 2026 auto-REFRESH runs as user queries (better freshness) — worth monitoring WLM/RPU consumption if you have many auto-refresh MVs.\n\n## Filtered out\n- Iceberg write GA (Nov 2025) and UPDATE/DELETE/MERGE on Iceberg (April 2026) — pre-window; deep format news deferred to the formats brief.\n- Serverless AI-driven scaling becoming default + 8–512 base-RPU range (April 2026) and up-to-7x new-query performance / Patch 200 (March 2026) — pre-window background.",

      "id": "fabric",

      "status": "ok",
      "md": "**TL;DR** — June's headline is hardware: Microsoft Build 2026 (June 2) unveiled GPU-accelerated Fabric Data Warehouse (\"CoddSpeed\"), with the opt-in early-access preview opening July 2026, alongside Warehouse time-travel on the SQL endpoint and private-link mirroring. Nothing urgent to patch; the only clock worth noting is Synapse trusted-services access retiring Aug 1.\n\n## Fabric Warehouse / SQL endpoint engine\n- **GPU-accelerated Warehouse (\"CoddSpeed\") — early-access preview opens July 2026.** Opt-in per workspace (workspace settings), applies to all SQL analytics endpoints + Warehouses, no query rewrites or format changes. Microsoft's internal benchmark claims up to 7x at 64-user concurrency vs three comparable cloud warehouses; UNC Health cited ~5x. Research won SIGMOD 2026 Best Industry Paper. Preview, not GA. [Fabric blog](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/A-new-analytics-frontier-GPU-accelerated-Fabric-Data-Warehouse/ba-p/5191598) [DW recap](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/From-query-acceleration-to-cache-cooldown-Everything-new-in/ba-p/5191621)\n- **Time Travel extended to the SQL analytics endpoint.** You can now query Lakehouse data as-of a prior point via `OPTION (FOR TIMESTAMP AS OF 'yyyy-MM-ddTHH:mm:ss[.fff]')`, not just Warehouse tables. Plus configurable retention windows for cost/compliance tuning, and cache-cooldown configurability for warm-query retention control. [June summary](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/Fabric-June-2026-Feature-Summary/ba-p/5190690)\n- **Refresh SQL analytics endpoint pipeline activity — GA.** First-class pipeline step to force SQL-endpoint metadata sync during runs, addressing the long-standing \"endpoint is stale after a write\" complaint. [June summary](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/Fabric-June-2026-Feature-Summary/ba-p/5190690)\n\n## Mirroring & Data Factory\n- **Mirroring now works behind private networking.** Workspaces that restrict public access (selected networks/private links) can mirror Azure SQL Database, SAP, SQL Server 2016–2022, and SharePoint — extending prior support for open mirroring, Cosmos DB, SQL MI, and SQL Server 2025. Removes a real blocker for locked-down tenants. [June summary](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/Fabric-June-2026-Feature-Summary/ba-p/5190690)\n- **AI-assisted Synapse Spark + pipeline migration from the CLI (preview).** New command-line path to migrate Synapse artifacts into Fabric, complementing the assessment-first pipeline migration assistant. Preview. [Fabric blog](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/AI-assisted-Synapse-Spark-and-pipeline-migration-to-Microsoft/ba-p/5234478)\n\n## OneLake & governance\n- **Extended lineage for materialized lake views** across lakehouse/workspace boundaries — define views in one lakehouse referencing sources elsewhere, Fabric resolves dependency order. Plus **OneLake item-size reporting** (per-item storage including system + soft-deleted data) and **GitHub Enterprise Cloud with data residency (ghe.com)** for Git integration. [June summary](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/Fabric-June-2026-Feature-Summary/ba-p/5190690)\n\n## Copilot / AI\n- **AI Functions default to gpt-5-mini** (low reasoning) across pandas, PySpark, Warehouse, and Dataflows Gen2; PySpark `.ai` chaining simplified (stays bound to result schema, no intermediate DataFrames). [June summary](https://community.fabric.microsoft.com/t5/Fabric-Updates-Blog/Fabric-June-2026-Feature-Summary/ba-p/5190690)\n- **Copilot + Query Editor in Fabric SQL database — GA.** For SELECT, Copilot now returns results directly rather than just emitting SQL. [Fabric blog](https://blog.fabric.microsoft.com/en-US/blog/copilot-and-query-editor-in-sql-database-in-fabric-ga-update/)\n\n## Real-Time Intelligence\n- **Eventstream adds Azure IoT Hub system + user properties** (June), so device lifecycle context is no longer dropped when only the message body was forwarded. [Sander van de Velde](https://sandervandevelde.wordpress.com/2026/06/09/ingesting-iot-hub-telemetry-into-fabric-eventstream-revisited/)\n\n## Worth your weekend\n- **Read the CoddSpeed writeup before betting on GPU DW.** The 7x claim is vendor-internal at high concurrency; independent analysis is starting to unpack where it holds. If you run concurrency-heavy reporting Warehouses, this is the most consequential engine shift since V-Order — but it's preview and opt-in. [ChatForest analysis](https://chatforest.com/builders-log/microsoft-fabric-coddspeed-gpu-data-warehouse-build-2026/)\n- **Direct Lake fallback discipline still matters.** Fallback to DirectQuery triggers on guardrails (rows/table 300M–3B by SKU, model 10–80 GB on disk, 2,000 cols/table) or unsupported features; set `DirectLakeBehavior = DirectLakeOnly` in dev to surface silent fallbacks before prod. Note Direct Lake on OneLake does not support DirectQuery fallback at all. [MS Learn](https://learn.microsoft.com/en-us/fabric/fundamentals/direct-lake-overview)\n\n## Heads up\n- **Synapse trusted-services access retires Aug 1, 2026.** The managed-identity + firewall-exception path for Synapse to reach Azure Storage/Key Vault goes away — roughly 3–4 weeks out. If you run legacy Synapse, verify your networking now. [Alithya](https://www.alithya.com/en/insights/blog-posts/azure-synapse-retiring-trusted-services-access-august-1-2026)\n- **Workspace-level surge protection + Capacity Overage** (rolled out earlier in 2026) are worth enabling on shared F-SKUs: overage is zero-cost until it activates and absorbs spikes before throttling; workspace-level CU caps stop one noisy workspace from starving critical ones. Capacity-level throttling still applies once CU is fully exhausted. [MS Learn](https://learn.microsoft.com/en-us/fabric/enterprise/surge-protection)\n\n## Signals worth watching\n- **Fabric IQ / agentic stack (Build 2026):** graph in Fabric GA, operations agents GA, and ontologies (extending semantic models with operational context + RTI live signals) GA \"coming months.\" Positions Fabric as the data backbone for agents; ontology-as-knowledge-source lands in Foundry and as an MCP tool. [Azure blog](https://azure.microsoft.com/en-us/blog/microsoft-build-2026-building-agentic-apps-with-microsoft-fabric-and-microsoft-databases/)\n- **F-SKU economics unchanged this window:** PAYG ~$0.18/CU-hr, F64 ~$8k/mo on-demand, ~40% off on 1-/3-yr reservation; Autoscale Billing for Spark runs on serverless dedicated resources at PAYG rates (no reservation discount) and still requires a base capacity. Verify against the [Azure pricing page](https://azure.microsoft.com/en-us/pricing/details/microsoft-fabric/) before quoting.\n\n## Filtered out\n- **CVE-2026-21229** (Power BI RCE, CVSS 8.0, authorized-attacker) — patched, disclosed Feb 10, 2026, outside the 30-day window.\n- **Snowflake↔OneLake Iceberg interop GA** and **Spark Native Execution Engine GA (Runtime 1.3)** — real but landed earlier in 2026, not this window; deep Iceberg/Delta format mechanics deferred to the formats brief.",

      "md": "**TL;DR** — ClickHouse shipped two releases in the window (26.5 Top-N optimizations in June, then 26.6 on July 3 with hypothetical skip indexes, cascading refreshable MVs and experimental streaming queries), while DuckLake/MotherDuck, Doris 4.1 (spill-to-disk), and StarTree's native Iceberg serving pushed the lakehouse-serving story forward. No actively-exploited unpatched CVE on this stack; the notable Trino credential-leak CVE is already patched (upgrade to ≥480).\n\n## Engine & cloud releases\n- **ClickHouse 26.6 (OSS) — July 3, 2026** — Record release (56 features / 79 perf / 366 fixes): \"hypothetical skip indexes\" via `EXPLAIN ... WHATIF` to estimate skip ratios before building, cascading refreshable MVs, experimental streaming/continuous queries (`... STREAM`), the workload scheduler now schedules memory (not just CPU/IO/concurrency), and multi-stage MPP scatter/gather distributed execution. [source](https://clickhouse.com/blog/clickhouse-release-26-06)\n- **ClickHouse 26.5 (OSS) — June 2026** — Top-N query optimizations: `ORDER BY … LIMIT` pushed through JOIN (20.4× faster, 175× less memory on TPC-H SF100) and `GROUP BY … LIMIT` without `ORDER BY` (11.9× faster, 185× less peak memory); WASM UDFs gain a `DETERMINISTIC` keyword for constant folding. Vendor-reported numbers, but reproducible against TPC-H. [source](https://clickhouse.com/blog/clickhouse-release-26-05)\n- **StarRocks 4.1.1 (OSS) — May 29, 2026** — Patch over 4.1.0 fixing BE processes failing to start in container environments; container users should skip 4.1.0. 4.1 line adds inverted indexes for shared-data clusters and vector indexes (IVFPQ/HNSW). [source](https://github.com/StarRocks/starrocks/releases)\n- **Apache Doris 4.1 (OSS) — spill-to-disk, June 2026** — Memory-intensive queries (large joins/aggregations) can now spill to disk to avoid OOM; positions 4.1 for heavier ad-hoc workloads on constrained memory. [source](https://www.velodb.io/blog/apache-doris-4-1-unified-storage-and-retrieval-for-ai-and-search)\n- **Starburst Enterprise 481-e / Trino 481 — June 15, 2026** — Regular STS cadence tracking OSS Trino 481. [source](https://docs.starburst.io/latest/k8s/release-notes.html)\n- **Apache Pinot 1.5.1 (OSS) — verified ~June 5, 2026** — Continues the upsert + native-Iceberg-external-table track surfaced in StarTree Cloud. [source](https://startree.ai/resources/apache-pinot-in-2026/)\n\n## Managed / cloud (distinct from OSS core)\n- **ClickHouse Cloud — ClickPipes region co-location & Pub/Sub source** — ClickPipes now runs in the same AWS/GCP region as your service (GCP via Private Service Connect), removing cross-cloud egress and cutting latency; new GCP Pub/Sub source in private preview; mx-central-1 (Mexico) live. [source](https://clickhouse.com/docs/whats-new/changelog/cloud)\n- **VeloDB (managed Doris) — Supermetal CDC (June 15) + VeloCLI (June 4)** — Direct CDC from Postgres/MySQL/MongoDB/SQL Server/Oracle via Supermetal; VeloCLI exposes query profiling, tablet inspection and cloud ops to terminal/AI agents. [source](https://medium.com/@VeloDB_poweredby_ApacheDoris)\n- **MotherDuck — Flights** — Agent-native ingestion: scheduled Python jobs on a managed runtime that an AI agent can write, deploy and operate from a chat session. [source](https://motherduck.com/blog/duckdb-ecosystem-newsletter-june-2026/)\n\n## Iceberg / lakehouse & DuckLake (deep format news deferred to Formats brief)\n- **DuckDB 1.4.1 + DuckLake 0.3 land in MotherDuck** — New SQL syntax, Iceberg interoperability, and perf gains; DuckLake \"inlining\" keeps small frequent commits in the catalog and only flushes to Parquet past a per-transaction threshold (default 10), avoiding tiny-file blizzards. [source](https://motherduck.com/blog/announcing-duckdb-141-motherduck/)\n- **StarTree/Pinot — low-latency serving directly on Iceberg** — Query Iceberg external tables without ingesting to segments; claims 500+ QPS sub-second on a 1 TB Iceberg table with a 4-node cluster by leveraging Pinot indexes. [source](https://startree.ai/resources/low-latency-serving-on-iceberg-with-apache-pinot-in-startree-cloud/)\n- **Dremio 26.x — Iceberg REST catalog fixes** — Fixes DELETE/UPDATE/MERGE failures when writing positional deletes to a REST catalog source; Requester Pays no longer default on S3-backed IRC sources (was breaking queries with an \"Unsupported header\" error). [source](https://docs.dremio.com/current/release-notes/version-260-release/)\n\n## Real-time ingestion & serving\n- **DuckDB Quack protocol + OAuth/OIDC** — First production-grade client-server protocol and auth layer for DuckDB, turning it into a real client-server citizen (relevant to MotherDuck's managed serving). [source](https://motherduck.com/blog/duckdb-ecosystem-newsletter-june-2026/)\n\n## CVEs\n- **Trino — CVE-2026-34214 (High, CVSS 7.7), PATCHED in 480** — Iceberg connector REST catalog static/vended credentials exposed via query JSON to users with SQL write privilege (affects 439–479). Published Mar 31, 2026 (pre-window) but flagging: if you run Trino/Starburst <480, upgrade; SEP 481-e covers it. [source](https://nvd.nist.gov/vuln/detail/CVE-2026-34214)\n- **ClickHouse — CVE-2026-31431 (\"Copy Fail\")** — Requires the attacker to already be running crafted code on the node, so practical risk is low on hardened/ClickHouse-only nodes; patch on normal upgrade cadence. [source](https://altinity.com/blog/cves-clickhouse-and-altinity-cloud-separating-signal-from-noise)\n\n## Worth your weekend\n- **ClickHouse 26.6 `EXPLAIN WHATIF` for hypothetical skip indexes** — Estimate a skip index's data-skip ratio before you pay to build it; a genuinely useful index-tuning workflow. [source](https://clickhouse.com/blog/clickhouse-release-26-06)\n- **DuckLake inlining deep-dive** — If you've been burned by small-file proliferation on lakehouse tables, the inlining model is worth understanding. [source](https://motherduck.com/blog/duckdb-ecosystem-newsletter-june-2026/)\n\n## Heads up\n- **Trino/Starburst <480** — Patch the Iceberg REST catalog credential leak (CVE-2026-34214); write-privileged users could read S3/Azure/GCS credentials.\n- **StarRocks 4.1.0 container users** — Move to 4.1.1; BE may fail to start reliably in containers on 4.1.0.\n- **ClickHouse 26.6 streaming queries are experimental** — Don't build production pipelines on `STREAM` yet.\n\n## Signals worth watching\n- **SAP acquiring Dremio (announced ~May 5, 2026)** — Pre-window but strategically large: consolidates a major Iceberg/lakehouse-query vendor under SAP; watch for roadmap/catalog (Polaris-based Dremio Catalog) direction. [source](https://www.theregister.com/software/2026/05/05/sap-dives-deeper-into-iceberg-with-dremio-acquisition/)\n- **StarRocks 2026 roadmap draft** — Iceberg v3, full DELETE/UPDATE/MERGE, incremental MVs, time travel, auto tablet split, multi-warehouse — an aggressive lakehouse-write agenda. [source](https://github.com/StarRocks/starrocks/issues/67632)\n- **Agent-native ingestion trend** — MotherDuck Flights + VeloDB VeloCLI both target AI agents operating ingestion/ops directly; a converging product pattern across challengers.\n\n## Filtered out\n- **StarTree \"vs Trino vs ClickHouse\" Iceberg benchmark** — Vendor benchmark (12.2B-row Parquet/S3); architecturally interesting (Pinot indexes vs. metadata pruning) but treat numbers as marketing until independently reproduced. [source](https://startree.ai/resources/iceberg-query-benchmark-vs-trino-vs-clickhouse/)\n- **Databend, SingleStore, Firebolt, Teradata VantageCloud, Druid/Imply, Yellowbrick** — No substantive engineering releases surfaced in the June 6–July 6 window (only comparison/marketing pages).",

      "md": "**TL;DR** — The memory market is the whole story this month: TrendForce's July 3 forecast has conventional DRAM up another 13–18% QoQ and NAND up 10–15% in Q3 2026, server RDIMM order books stuck near a 70% fill rate, and the Big Three now facing a US price-fixing class action — if you size or refresh DB servers, DRAM/SSD cost has structurally reset and won't ease before late 2027. On silicon, AMD's Zen 6 \"Venice\" (256 cores, 16-channel DDR5) firms up for H2 2026 while Intel's P-core \"Diamond Rapids\" slips to 2027.\n\n## Commodity memory & DRAM/NAND market\n- **Q3 2026 memory still climbing (TrendForce, Jul 3)** — Conventional DRAM contract prices forecast +13–18% QoQ and NAND +10–15% QoQ; server DRAM and enterprise SSD hold double-digit growth. Gains are \"moderating\" only versus the brutal earlier quarters (1Q26 DRAM revenue jumped 81% QoQ). [TrendForce](https://www.trendforce.com/presscenter/news/20260703-13134.html) **Cost/performance shift:** DRAM is no longer a rounding error in a DB BOM — re-run any sizing that assumed 2024–25 $/GB, and prefer memory-efficient engines/compression before buying more DIMMs.\n- **Samsung reportedly seeking up to 20% 3Q26 DRAM hike; LPDDR >20% (Jul 3)** — Direct read-through to Arm/edge and unified-memory DB boxes where LPDDR dominates. [TrendForce](https://www.trendforce.com/news/2026/07/03/news-samsung-reportedly-seeks-up-to-20-3q26-dram-price-increase-lpddr-hikes-may-exceed-20/)\n- **Server RDIMM allocation crunch** — 64GB DDR5 RDIMM prices roughly doubled; Samsung/SK Hynix cut confirmed allocations ~30%, leaving Tier-1 cloud order books near a 70% fill rate. Consumer 32GB DDR5 kits hit ~$375. [TechPowerUp](https://www.techpowerup.com/342331/server-dram-pricing-jumps-50-only-70-of-orders-getting-filled) · [Tom's Hardware](https://www.tomshardware.com/pc-components/ram/ram-price-index-2026-lowest-price-on-ddr5-and-ddr4-memory-of-all-capacities)\n- **Enterprise SSD/NAND sold out through 2026** — Enterprise SSD contract prices rose an estimated 53–58% in Q1 and another ~70–75% in Q2; Phison's CEO says NAND has more than doubled and all 2026 output is committed. Small-capacity high-perf enterprise SSDs are the tightest, constrained by internal DRAM. [Tom's Hardware](https://www.tomshardware.com/pc-components/ssds/phison-ceo-confirms-nand-prices-have-more-than-doubled-and-will-continue-to-rise-all-2026-production-already-sold-out-ssds-facing-pricing-apocalypse-throughout-2027) **Cost/performance shift:** storage tier costs now rival compute — revisit hot/warm/cold tiering, retention, and dedup/compression assumptions before scaling capacity.\n- **DDR4 (and even DDR2/DDR3) squeezed by EOL reallocation** — Legacy DIMMs for older DB fleets are climbing 60–80%+ as makers pull wafers to HBM/DDR5; plan lifecycle exits, not spot restocks. [TrendForce](https://www.trendforce.com/presscenter/news/20260622-13112.html)\n\n## Server CPUs\n- **AMD EPYC \"Venice\" (Zen 6, TSMC N2) firms for H2 2026** — Up to 256 cores, a 16-channel DDR5 interface (up from 12) and higher PCIe/CXL lane counts; AMD cites ~1.7x performance and ~1.3x thread density over Turin. Bigger memory bandwidth per socket directly helps scan-heavy/OLAP DB workloads. [ServeTheHome](https://www.servethehome.com/amd-epyc-venice-2026-with-1-3x-thread-density-and-1-7x-performance/) · [Tom's Hardware](https://www.tomshardware.com/pc-components/cpus/amds-256-core-epyc-venice-cpu-in-the-labs-now-coming-in-2026)\n- **Intel splits: Clearwater Forest ships, Diamond Rapids slips to 2027** — Xeon 6+ \"Clearwater Forest\" (up to 288 E-cores, Intel 18A) launched at Computex 2026, but the P-core, 16-channel/MRDIMM-gen2/PCIe-6.0 \"Diamond Rapids\" (Xeon 7) is now reported for mid-2027. For memory-bandwidth-bound DBs, AMD holds the near-term high-channel-count advantage. [ServeTheHome](https://www.servethehome.com/intel-xeon-7-diamond-rapids-now-slated-for-2027/) · [Tom's Hardware](https://www.tomshardware.com/pc-components/cpus/intels-upcoming-xeon-7-diamond-rapids-server-cpus-reportedly-delayed-to-2027-next-gen-coral-rapids-lineup-lands-2028-but-can-be-accelerated-according-to-new-leak)\n\n## Audited DB benchmarks (hardware-driven)\n- **Fresh TPC-H results posted through June** — HPE ProLiant DL345 Gen11 (EPYC 9575F) at 2.5M QphH@3TB / $247/kQphH; HPE at 30TB (2,946,259 QphH / $1,499/kQphH, Jun 11); Dell at 1TB (5,489,326 QphH / $25.01/kQphH) and 3TB (5,484,276 QphH / $60.45/kQphH, Jun 23); Alibaba Cloud at 3TB (8,443,627 QphH, Jun 29). All audited — useful $/throughput anchors, though most run high-clock EPYC \"F\" SKUs, so map to your own SKU before extrapolating. [TPC-H](https://www.tpc.org/tpch/)\n\n## CXL memory\n- **SK hynix shows 256GB CXL 3.2 module + pooled-memory designs at HPE Discover (Jun 19)** — Alongside Samsung's CMM-D line and planned \"Pangea v3\" (CXL 3.2), pooled/tiered DRAM is moving toward production. Relevant for capacity-bound in-memory DBs and growing vector indexes where you'd otherwise overbuy per-socket DIMMs — now doubly attractive given DIMM pricing. [TechTimes](https://www.techtimes.com/articles/318703/20260619/sk-hynix-shows-its-full-ai-server-memory-stack-cxl-32-modules-hpe-discover.htm)\n\n## NVMe & storage\n- **PCIe 6.0 enterprise SSDs arriving (~28 GB/s)** — Micron's Gen6 drives are in mass production and Samsung/Silicon Motion/InnoGrit are close behind, at ~25W and up to 256TB capacities. Enterprise-only for now; meaningful for scan/ingest-bound DBs, but weigh against NAND pricing and the fact that most OLTP is latency- not bandwidth-bound. [The Register](https://www.theregister.com/2026/02/17/micron_pcie_6/) · [TechPowerUp](https://www.techpowerup.com/341451/samsung-targets-256-tb-pcie-6-0-ssd-in-2026-512-tb-capacity-in-2027)\n\n## Worth your weekend\n- **DuckDB on Apple-Silicon unified memory** — The DuckDB team's MacBook Neo run (ClickBench + TPC-DS) and independent M4 TPC-H tests show unified memory delivering credible analytical throughput on entry-level hardware; a good sanity check on how much single-node embedded analytics you can do before renting a server. [DuckDB benchmarks](https://duckdb.org/docs/current/guides/performance/benchmarks) · [M4 unified-memory TPC-H repro](https://github.com/sadopc/unified-db-2)\n- **VLDB CXL papers to pre-read before you spec CXL** — \"CXL Memory Performance for In-Memory Data Processing\" (Weisgut et al., PVLDB v18) and \"CXL and the Return of Scale-Up Database Engines\" (Lerner) are the grounded references on real latency/bandwidth behavior versus vendor decks. [PVLDB v18](https://www.vldb.org/pvldb/vol18/p3119-weisgut.pdf) · [PVLDB v17](https://www.vldb.org/pvldb/vol17/p2568-lerner.pdf)\n\n## Heads up\n- **Buy memory/SSD on contracts now, not spot** — With allocations cut and 2026 NAND fully committed, procurement lead times and prices favor locking LTAs; right-size RAM via compression/tiering rather than assuming you can add DIMMs later at yesterday's prices.\n- **Antitrust overhang** — A US class action (filed ~Jun 25–30) accuses Samsung/SK Hynix/Micron of throttling standard DRAM for HBM margins. Doesn't change your prices near-term, but signals continued tightness and possible procurement/legal noise. [TechTimes](https://www.techtimes.com/articles/319302/20260630/samsung-sk-hynix-micron-hit-us-price-fixing-class-action-over-memory-shortage.htm)\n\n## Signals worth watching\n- **Venice launch specs (H2 2026)** — Final DDR5 channel count, PCIe/CXL lanes and per-socket bandwidth will decide the next OLAP refresh math.\n- **CXL 3.x pooling maturity** — Whether 256GB CXL 3.2 modules land at latencies real DB engines tolerate (watch tiering/page-migration work like TierBPF).\n- **NVMe-oF/RoCE for disaggregated DB storage** — Sub-5µs fabric latency claims and Windows Server's NVMe-oF initiator preview point to more remote-NVMe DB deployments; validate tail latency, not averages.\n\n## Filtered out\n- HBM/AI-accelerator DRAM allocation as a *cause* — the market driver, but the HBM       "md": "**TL;DR** — A busy month for the security team: LiteLLM has an actively-exploited RCE (CISA KEV, patch to 1.83.7), Node.js shipped 12 CVEs across all lines, and Spring dropped ~26 CVEs plus Spring Boot 3.5's EOL. On the fun side, package managers (pnpm 11.6–11.9, uv) are racing to harden the npm/PyPI supply chain after the Red Hat \"Miasma\" worm.\n\n## CVEs & supply chain\n- **LiteLLM RCE actively exploited — patch to 1.83.7 (URGENT)** — CVE-2026-42271 is a command injection in LiteLLM's MCP stdio test endpoints (CVSS 8.7) reachable by any authenticated user; chained with CVE-2026-48710 it becomes an unauthenticated CVSS 10.0 RCE. Affects 1.74.2–1.83.6; fixed in 1.83.7 (endpoints now require PROXY_ADMIN). CISA added it to KEV citing in-the-wild exploitation. [Hacker News](https://thehackernews.com/2026/06/litellm-flaw-cve-2026-42271-exploited.html) · [Endor Labs](https://www.endorlabs.com/vulnerability/cve-2026-42271)\n- **Node.js patches 12 CVEs across every active line** — June 18 release fixes two HIGH bugs affecting 22/24/26: CVE-2026-48933 (WebCrypto abort/DoS on ≥2 GiB input) and CVE-2026-48618 (Unicode dot-separator TLS wildcard auth bypass), plus mTLS/SNI and permission-model issues. Upgrade to 22.23.0 / 24.17.0 / 26.3.1 (bundles openssl 3.5.7, nghttp2 1.69.0). No known exploitation. [Node.js advisory](https://nodejs.org/en/blog/vulnerability/june-2026-security-releases)\n- **\"Miasma\" npm worm hits @redhat-cloud-services** — ~32 packages (~80k weekly downloads) trojanized June 1–2 via a compromised Red Hat GitHub account pushing orphan commits; a preinstall hook ran a 4.29 MB dropper that pulled Bun and harvested GitHub/npm/AWS/Azure/GCP creds. Notably the malicious builds carried *valid SLSA provenance* (OIDC-signed pipeline) — provenance verified the build, not the intent. Audit lockfiles for affected versions. [Microsoft Security](https://www.microsoft.com/en-us/security/blog/2026/06/02/preinstall-persistence-inside-red-hat-npm-miasma-credential-stealing-campaign/) · [Wiz](https://www.wiz.io/blog/miasma-supply-chain-attack-targeting-redhat-npm-packages)\n- **Spring portfolio: ~26 CVEs, none critical** — June 10 batch includes Spring Framework CVE-2026-41842 (HIGH, DoS via versioned static resources in MVC+WebFlux) plus path-traversal, multipart-DoS and session-fixation issues affecting 7.0.0–7.0.7, 6.2.x, 6.1.x, 5.3.x. All patched; upgrade to current maintenance releases. [Spring Security](https://spring.io/security/) · [CVE-2026-41842](https://spring.io/security/cve-2026-41842/)\n\n## Runtime & language releases\n- **.NET 10 LTS June servicing (10.0.9)** — June 9 servicing update for the November LTS carries security and reliability fixes; SDK 10.0.301. Routine but security-bearing. [.NET Blog](https://devblogs.microsoft.com/dotnet/dotnet-and-dotnet-framework-june-2026-servicing-updates/)\n- **Go 1.25.11 security point release** — Published June 2 with fixes to crypto/x509, mime and net/textproto plus compiler/runtime bugs. If you're on 1.25.x, take the patch. (Reminder: Go 1.26's Green Tea GC and container-aware GOMAXPROCS became the defaults back in Feb 2026.) [Microsoft for Go](https://devblogs.microsoft.com/go/go-1-26-4-1-and-1-25-11-1-microsoft-builds-now-available/) · [Green Tea GC](https://go.dev/blog/greenteagc)\n\n## Frameworks\n- **Spring Boot 4.1.0 GA; 3.5 reaches OSS end-of-life** — 4.1.0 landed June 10 (with 4.0.7). The final free 3.5.x patch was 3.5.16 on June 25, and Spring Boot 3.5 hit EOL June 30 — anyone still on 3.5 now needs a commercial-support path or an upgrade plan. [Spring Boot versions (HeroDevs)](https://www.herodevs.com/blog-posts/spring-boot-versions-eol-dates-and-latest-releases-april-2026)\n\n## Build & package managers\n- **pnpm 11.6→11.9 harden supply-chain defaults** — Across June: `minimumReleaseAge`/`trustPolicy` exclusion tightening, `pnpm sbom` improvements (incl. `--exclude-peers`), `frozenStore` for read-only stores, scope-specific auth tokens, and integrity computation for registries lacking checksums. A direct, practical response to the npm attacks above. [pnpm 11.7 notes](https://pnpm.io/blog/releases/11.7)\n- **uv keeps its weekly cadence** — Mid/late-June releases add wheel-before-sdist publishing, preview-feature config in uv.toml/pyproject.toml, and `RUFF`/`TY` binary-path env vars; a June 19 point release reverted a transparent-Python-upgrade change that broke pre-commit-uv. Pin carefully if you rely on workspace/upgrade behavior. [uv releases](https://github.com/astral-sh/uv/releases)\n\n## Observability\n- **OpenTelemetry launches \"Blueprints\"** — New initiative (June) offering prescriptive reference architectures for Collector/K8s/app deployments to curb config sprawl; the spec also merged deprecation of OpenCensus compatibility (PR #5138). Signals a push toward opinionated, operational defaults. [InfoQ](https://www.infoq.com/news/2026/06/opentelemetry-blueprints-launch/)\n\n## Worth your weekend\n- **Green Tea GC in production** — If you've upgraded to Go 1.26, the write-up on the page-scanning (vs object-scanning) collector and its 10–40% GC-overhead reduction is worth understanding before you tune anything. [go.dev/blog/greenteagc](https://go.dev/blog/greenteagc)\n- **Provenance ≠ safety** — The Miasma post-mortems are a sobering read: SLSA provenance faithfully attested a pipeline that was itself compromised. Good prompt to revisit what your `trustPolicy`/`minimumReleaseAge` and CI OIDC scopes actually protect against. [Wiz](https://www.wiz.io/blog/miasma-supply-chain-attack-targeting-redhat-npm-packages)\n\n## Heads up\n- **Spring Boot 3.5 EOL (June 30) already passed** — no more free CVE patches on 3.5.x; plan the jump to 3.5→4.0/4.1 or budget for extended support.\n- **Node HIGH TLS bypass (CVE-2026-48618)** affects mTLS/wildcard-cert setups on all lines — worth prioritizing if you terminate TLS in Node.\n\n## Signals worth watching\n- **Kafka 4.1** — Queues for Kafka (KIP-932) in preview and the new Streams Rebalance Protocol (KIP-1071, early access) are maturing; still pre-production but shaping how you'll do queue-style consumption. [Confluent](https://www.confluent.io/blog/introducing-apache-kafka-4-1/)\n- **Temporal durable execution goes serverless** — Serverless Workers (AWS Lambda), Workflow Streams, and Nexus GA for Python (from Replay 2026, late May) point at durable execution becoming the default substrate for agentic workflows. Battle-testing still ahead. [Temporal](https://temporal.io/blog/replay-2026-product-announcements)\n- **Valkey momentum** — 8.1.8 maintenance shipped in June; 9.x (atomic slot migration, ~1B req/s cluster throughput) is now the default for new AWS ElastiCache/GCP Memorystore instances. [Valkey 9](https://valkey.io/blog/introducing-valkey-9/)\n\n## Filtered out\n- Prisma/Drizzle: no June releases (Prisma 7.6.0 was March; PlanetScale acquired Drizzle's team in March) — no new engineering signal this window.\n- Non-backend RCEs in CISA KEV (Magento CVE-2026-45247, Oracle PeopleSoft CVE-2026-35273, Windows Netlogon CVE-2026-41089) — real and exploited, but out of this brief's scope.",
