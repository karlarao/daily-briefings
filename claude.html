      "md": "**TL;DR** — The builder story this month is tool-execution and statelessness: Anthropic shipped persistent-REPL code execution across all SDKs and quietly landed breaking message-format changes on Sonnet 5 (manual extended-thinking and sampling params now 400, +30% tokenizer), while the MCP 2026-07-28 spec RC (stateless core, no `initialize` handshake, new required transport headers) plus beta SDKs give you three weeks to plan a migration. No new in-window critical CVE on a mainstream builder stack.\n\n## API primitives (tool use, caching, reasoning)\n- **Anthropic code execution gets persistent REPL state, GA in every SDK** — `code_execution_20260120` (June 18) adds REPL state persistence and is the minimum version for programmatic tool calling; Python/TS/Go/Java/Ruby/PHP/C# all ship it with no beta header. `code_execution_20260521` (June 11) discloses the 90s-per-cell limit so the model can budget long cells. [release notes](https://platform.claude.com/docs/en/release-notes/overview)\n- **Web search/fetch add `response_inclusion` for context packing** — `web_search_20260318`/`web_fetch_20260318` (June 11) let you drop consumed result blocks from the API response, trimming tokens in agentic loops. Pairs with the existing code-execution \"dynamic filtering.\" [release notes](https://platform.claude.com/docs/en/release-notes/overview)\n- **Breaking: Claude Sonnet 5 changes the message contract** — On `claude-sonnet-5` (June 30): manual extended thinking (`thinking:{type:\"enabled\",budget_tokens}`) now returns **400**, non-default `temperature`/`top_p`/`top_k` return **400**, adaptive thinking is on by default, and a new tokenizer emits **~30% more tokens** for the same text — recheck token budgets, cost math, and context limits before switching. [release notes](https://platform.claude.com/docs/en/release-notes/overview)\n- **Gemini Interactions API is now the recommended interface; structured outputs get real JSON Schema** — Interactions API reached GA (June 2026) as the default for new projects, and structured outputs now accept standard JSON Schema across supported models (Pydantic/Zod work out-of-the-box) with key-order preservation and combinable built-in tools on Gemini 3. Batch API adds webhooks to replace polling. [Gemini changelog](https://ai.google.dev/gemini-api/docs/changelog) · [structured outputs post](https://blog.google/innovation-and-ai/technology/developers-tools/gemini-api-structured-outputs/)\n- **OpenAI Responses API adds built-in tools and a web-search token budget** — Built-in web search, file search, and computer use for the Responses API, plus `return_token_budget` to opt into longer GPT-5+ reasoning search runs and an inline `moderation` object covering both input and output. [OpenAI changelog](https://developers.openai.com/api/docs/changelog)\n\n## MCP\n- **MCP goes stateless: 2026-07-28 spec RC + beta SDKs land** — The biggest MCP revision since launch removes the `initialize` handshake and `Mcp-Session-Id`, requires new `Mcp-Method`/`Mcp-Name`/`MCP-Protocol-Version` transport headers for routing, adds `ttlMs`/`cacheScope` on list/read results, hardens OAuth (RFC 9207 `iss` validation), and moves Tasks to an opt-in extension. Beta SDKs (Python v2, TS v2, Go, C#) are testable now; final ships **July 28**. [RC blog](https://blog.modelcontextprotocol.io/posts/2026-07-28-release-candidate/) · [beta SDKs](https://blog.modelcontextprotocol.io/posts/sdk-betas-2026-07-28/)\n- **Anthropic MCP tunnels move to a new endpoint** — Management API relocated from `/v1/organizations/tunnels` (Admin API) to `/v1/tunnels` (Claude API) under `anthropic-beta: mcp-tunnels-2026-06-22`; old surface stays during a migration window. [release notes](https://platform.claude.com/docs/en/release-notes/overview)\n\n## Agent frameworks\n- **LangChain/LangGraph 1.0 are the stable baseline; middleware is the pattern** — `create_agent` on the LangGraph runtime with a middleware system (human-in-the-loop, summarization, PII redaction) and structured output folded into the main agent loop to cut an extra LLM call. LangGraph shipped point releases through 1.2.7 in June. [LangChain changelog](https://changelog.langchain.com/)\n- **Claude Managed Agents keep filling out** — June adds scheduled (cron) deployments, env-var vault credentials with egress injection control, per-session config overrides, agent/deployment lifecycle webhooks, and streamed message `event_delta`s. Useful if you want a hosted harness instead of rolling your own loop. [release notes](https://platform.claude.com/docs/en/release-notes/overview)\n\n## Inference & serving\n- **SGLang ships next-gen speculative decoding** — DFlash and Spec V2 (June 2026), plus day-0 support for Nemotron 3 Ultra/Super and Higgs Audio v3. vLLM's Unified Parallel Drafting lets spec decoding run alongside structured outputs. [SGLang](https://github.com/sgl-project/sglang)\n\n## Eval & observability\n- **OTel GenAI is the emerging wire format — but still \"Development\"** — Langfuse and Phoenix are OTel-native; LangSmith/Braintrust ingest via dedicated paths. As of semconv v1.41 the agent/workflow/tool/model spans and token/latency metrics are defined but not stable, so pin versions and expect churn. [OTel GenAI overview](https://futureagi.com/glossary/open-telemetry/)\n\n## Worth your weekend\n- **Anthropic's context-engineering playbook** — \"Effective context engineering\" and \"Effective harnesses for long-running agents\": treat context as a finite attention budget, use just-in-time retrieval over upfront dumping, and use compaction + progress files + git checkpoints to survive context-window resets. The clearest articulation of the patterns behind the memory/compaction/context-editing APIs. [context engineering](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents) · [long-running harnesses](https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents)\n\n## Heads up\n- **MCP stateless migration (July 28)** — If you run MCP servers/clients, budget work now: drop session logic, add the required transport headers, migrate Tasks to the extension API, and note the missing-resource error code shifts `-32002` → `-32600`. [RC blog](https://blog.modelcontextprotocol.io/posts/2026-07-28-release-candidate/)\n- **Anthropic retirements/removals** — Sonnet 4 and Opus 4 now return errors (retired June 15); Opus 4.7 fast mode is removed **July 24**; Opus 4.1 retires Aug 5. Audit pinned model IDs. [release notes](https://platform.claude.com/docs/en/release-notes/overview)\n- **Patch reminder (not new this window)** — If any self-hosted vLLM is still <0.18.0, the multimodal-RCE chain CVE-2026-22778 (CVSS 9.8, Feb) and trust-remote-code bypass CVE-2026-27893 (8.8, Mar) remain unpatched on old builds. [CVE-2026-22778 advisory](https://github.com/advisories/GHSA-4r2x-xpjr-7cvv)\n\n## Signals worth watching\n- **MCP tool poisoning / indirect prompt injection stays the top agent risk** — Ongoing wave of command-injection CVEs in unofficial MCP servers (AWS/Azure connectors, nginx-ui \"MCPwn\" CVE-2026-33032, 9.8) and new sampling-based injection vectors. Treat every tool description and tool result as untrusted input; gate egress. [Unit 42 on MCP vectors](https://unit42.paloaltonetworks.com/model-context-protocol-attack-vectors/) · [vulnerable MCP DB](https://vulnerablemcp.info/)\n- **RAG retrieval stack consolidating** — Production default is settling on BGE-M3 (dense+sparse+multi-vector) with a reranker (BGE-reranker-v2, zerank-1); Qwen3-Embedding and Gemini Embed 2 lead hosted/multilingual benchmarks. No single in-window release, but rerank-before-generate is now table stakes. [Milvus embedding comparison](https://milvus.io/blog/choose-embedding-model-rag-2026.md)\n\n## Filtered out\n- Frontier model *releases/pricing* (Claude Sonnet 5, Fable 5/Mythos 5, rate-limit tier changes) → AI Daily; captured here only for their breaking API/tokenizer effects.\n- Coding-agent/dev-tool CVEs (Cursor DuneSlide CVE-2026-50548/50549, Windsurf CVE-2026-30615) → AI Daily.\n- Gateway comparison listicles (LiteLLM/OpenRouter/Portkey) — no material in-window release beyond Portkey's earlier OSS move.",

      "md": "**TL;DR** — A self-propagating npm worm (\"Mini Shai-Hulud\") kept chewing through widely-used frontend packages (TanStack, Red Hat, Mastra) — audit your lockfiles. On the happier side, TypeScript 7's Go-native compiler hit RC, Astro 7 shipped a Rust rewrite, React Router v8 landed with unstable RSC, and Cloudflare bought VoidZero (Vite/Vitest/Rolldown).\n\n## CVEs & npm supply chain\n- **\"Mini Shai-Hulud\" worm hit TanStack — treat any @tanstack install from mid-May on as suspect.** ~84 malicious artifacts across 42 @tanstack packages (including `@tanstack/react-router`, 12M+ weekly downloads) were published via a hijacked OIDC release pipeline; notably the first documented malicious npm package carrying *valid SLSA provenance*, so provenance alone won't save you. Detected within ~20 min and yanked, but the payload steals CI/CD secrets, GitHub tokens, AWS IMDS creds and SSH keys. Audit lockfiles and rotate any exposed CI secrets. [Socket](https://socket.dev/blog/tanstack-npm-packages-compromised-mini-shai-hulud-supply-chain-attack) · [TanStack postmortem](https://tanstack.com/blog/npm-supply-chain-compromise-postmortem)\n- **@redhat-cloud-services compromised (Jun 1) — 32 packages, 96 versions, \"Miasma\" worm.** Same self-spreading credential-stealer family; injected via a maintainer GitHub account compromised through a malicious VS Code extension. ~117k weekly downloads affected. [Red Hat RHSB-2026-006](https://access.redhat.com/security/vulnerabilities/RHSB-2026-006) · [Aikido](https://www.aikido.dev/blog/red-hat-npm-packages-compromised-credential-stealing-worm)\n- **@mastra AI framework compromised (Jun 17) — 140+ packages in one 88-minute automated run.** Microsoft attributes it (high confidence) to North Korea's Sapphire Sleet; a postinstall payload harvested developer credentials. Relevant if you're building agent tooling on Mastra. [Microsoft Security](https://www.microsoft.com/en-us/security/blog/2026/06/17/postinstall-payload-inside-mastra-npm-supply-chain-compromise/) · [Hacker News](https://thehackernews.com/2026/05/mini-shai-hulud-worm-compromises.html)\n\n## Framework & tooling releases\n- **TypeScript 7.0 RC — the Go-native compiler is now on the mainline (Jun 18).** ~10x faster type-checks (VS Code's ~1.5M LOC drops from ~78s to ~7.5s), parallel parse/check/emit, new `--checkers`/`--builders`/`--singleThreaded` flags. It's a *port* preserving type semantics, not a rewrite. Still RC — GA expected within ~a month; validate your build against `tsgo` now but don't make it the CI gate yet. [Visual Studio Magazine](https://visualstudiomagazine.com/articles/2026/06/22/typescript-7-0-rc-moves-microsofts-go-rewrite-into-the-mainline-compiler.aspx)\n- **Astro 7 (Jun 22) — Rust `.astro` compiler + Rust MDX pipeline.** With Vite 8/Rolldown, builds benchmark 15–61% faster. Adds Advanced Routing (`src/fetch.ts` for full request-pipeline control) and AI-agent detection (background dev server, structured JSON logs). Major version — check the migration guide. [astro.build](https://astro.build/blog/astro-7/)\n- **React Router v8 (Jun 16) — new yearly-major cadence, first *unstable* RSC in Framework Mode.** Timed to Node 20 EOL. RSC support is experimental; safe to upgrade the router, gate RSC behind the unstable flag. [Remix blog](https://remix.run/blog/react-router-v8)\n- **Next.js: stable is 16.2.x (16.2.7 as of Jun 10); 16.3 is Preview/canary only (late Jun).** 16.3 previews \"Instant Navigations\" (SPA-like server-driven nav, per-route shell prefetch, Navigation Inspector, Playwright helpers) plus Turbopack and Cache Components (`use cache` + PPR) refinements. Don't ship 16.3 to prod yet — API still moving. [Next 16.3 Instant Navigations](https://nextjs.org/blog/next-16-3-instant-navigations) · [Turbopack notes](https://nextjs.org/blog/next-16-3-turbopack)\n- **React 19.2.7 patch (Jun 1) — fixes a Server Actions FormData regression** (missing entries). Low-risk patch; take it if you use Server Actions. [GitHub release](https://github.com/facebook/react/releases/tag/v19.2.7)\n- **SvelteKit (Jun) — remote-functions improvements + new `query.live()` for realtime server data.** Heads up: breaking changes in the (still-experimental) remote functions API. Svelte 5.56 allows declarations directly in markup. [What's new in Svelte, June 2026](https://svelte.dev/blog/whats-new-in-svelte-june-2026)\n\n## Build tooling\n- **Cloudflare acquired VoidZero (Jun 4) — Vite, Vitest, Rolldown, Oxc.** All stay open source with a stated $1M independent community fund. Structurally significant for the toolchain most frontend teams now depend on; worth watching for governance/roadmap signals. [Nexgismo](https://www.nexgismo.com/blog/cloudflare-voidzero-vite-8-rolldown-guide-2026-3)\n- **Vite 8.1 (Jun 23) — Rolldown-powered, resolves the v8 upgrade regressions.** Vite 8 (March) ships Rolldown as the single Rust bundler; Rolldown hit 1.0 (locked API) in May. If you held off on Vite 8 over regressions, 8.1 is the one to test. [Vite blog](https://github.com/vitejs/vite/releases)\n\n## Web platform & Baseline\n- **CSS Subgrid reached Baseline Widely available (June)**, and `image-rendering` plus `text-decoration-skip-ink: all` landed Newly available per the recent Baseline digest — subgrid is now safe to ship without fallbacks for most audiences. [web.dev Baseline](https://web.dev/baseline) · [May digest](https://web.dev/blog/baseline-digest-may-2026)\n\n## Perf & Core Web Vitals\n- **CrUX May-2026 data (released Jun 9): 55.9% of origins pass all three CWV; INP 86.6% good, LCP 68.6%, CLS 81.3%.** LCP remains the field's weakest link. Google refined INP measurement for input-heavy pages and expanded soft-navigation (SPA) support in CrUX; TTFB got a more prominent PSI diagnostic but is *not* a ranking signal. [Chrome CrUX release notes](https://developer.chrome.com/docs/crux/release-notes)\n\n## Worth your weekend\n- Run your codebase through **TypeScript 7 RC (`tsgo`)** to gauge the real speedup and catch any emit differences before GA.\n- Trial **Vite 8.1 / Rolldown 1.0** on a branch — the Rust bundler is the near-term default across Vite, Astro, and much of the ecosystem.\n\n## Heads up\n- **npm hygiene is now table stakes:** SLSA provenance was forged in the TanStack incident, so pin exact versions, prefer `npm ci` with reviewed lockfiles, minimize `postinstall` trust, and scope/rotate CI tokens (short-lived OIDC, least privilege).\n- **Next.js 16.3 and SvelteKit remote functions are pre-stable** with in-flight breaking changes — keep them out of production paths.\n\n## Signals worth watching\n- **Angular v22** RC was cut in late May; a stable June/July landing is plausible but unconfirmed against primary release docs — verify before planning an upgrade. [Angular releases](https://angular.dev/reference/releases)\n- **Turbopack** is now default for dev *and* build in Next 16; watch 16.3's compiler-perf work as it stabilizes.\n- **Cloudflare/VoidZero** stewardship of Vite/Vitest/Rolldown — governance and roadmap direction over the next few releases.\n\n## Filtered out\n- Vue/Nuxt June activity was routine patch-level bug-fix releases (compiler-core, hydration, SSR) — nothing breaking.\n- TC39 June plenary outcomes weren't confirmable against primary agendas/minutes in this pass; deferring rather than reporting unverified stage moves.",

      "md": "**TL;DR** — The last 30 days were dominated by a cluster of Linux kernel page-cache privilege-escalation bugs (pedit COW, DirtyClone, and the K8s-weaponized Copy Fail) that give unprivileged container escape on EKS/GKE/AKS nodes — patch node images now. Meanwhile K8s shipped routine patch releases, Cilium 1.18 and OpenTofu 1.12.2 landed, Graviton5 (M9g) went GA, and GitHub Actions flipped to Node 24 by default.\n\n## Security / CVEs (patch now)\n- **pedit COW — CVE-2026-46331 (CVSS 8.5)** — Out-of-bounds write in the `act_pedit` tc/traffic-control module corrupts the shared page cache to poison cached binaries and grant root, invisible to AIDE/Tripwire. Public PoC since June 17; especially dangerous on container/multi-tenant hosts with unprivileged user namespaces. Fixes available from Canonical/distros. [Hacker News](https://thehackernews.com/2026/06/new-linux-pedit-cow-exploit-enables.html) · [Canonical](https://canonical.com/blog/pedit-cow-linux-vulnerability-fixes-available)\n- **DirtyClone — CVE-2026-43503 (CVSS 8.8)** — JFrog found the DirtyFrag mitigation was incomplete: `__pskb_copy_fclone()` drops the `SKBFL_SHARED_FRAG` flag, letting an unprivileged local user write into file-backed page-cache memory for root. Same \"no on-disk change\" evasion as pedit COW; both disclosed ~June 27–29. Distro fixes shipping. [Hive Security](https://hivesecurity.gitlab.io/blog/linux-lpe-pedit-cow-dirtyclone-2026/) · [Canonical](https://canonical.com/blog/dirtyclone-linux-vulnerability-fixes-available)\n- **Copy Fail — CVE-2026-31431 (CVSS 7.8), now weaponized for K8s** — The `algif_aead`/authencesn 4-byte page-cache write bug now has a public Kubernetes container-escape PoC using shared image layers, validated on Amazon EKS, GKE and Alibaba ACK — unprivileged pod to node root. GKE patched Container-Optimized OS node images (1.30–1.36) in June, with Ubuntu node images pending at disclosure. Verify your node image build, not just the K8s version. [Microsoft](https://www.microsoft.com/en-us/security/blog/2026/05/01/cve-2026-31431-copy-fail-vulnerability-enables-linux-root-privilege-escalation/) · [PoC](https://github.com/Percivalll/Copy-Fail-CVE-2026-31431-Kubernetes-PoC) · [GKE bulletins](https://docs.cloud.google.com/kubernetes-engine/security-bulletins)\n\n## Kubernetes\n- **1.34 patch train continues; EOL clock started** — 1.34.9 shipped June 9, 2026. The 1.34 line enters maintenance mode Aug 27 and hits EOL Oct 27, 2026 — plan the jump to 1.35 (already GA since Dec 2025). No new API removals this cycle, but audit for the earlier `flowcontrol`/`endpointslice` v1beta deprecations before upgrading. [Kubernetes releases](https://kubernetes.io/releases/)\n\n## Networking / eBPF\n- **Cilium 1.18 (June 16)** — Encrypted overlay via IPsec, expanded IPv6, ingress bandwidth controls, and notable policy-engine performance improvements plus Gateway API and IPAM work. Worth testing if you run large policy sets or need node-to-node overlay encryption without WireGuard. [Isovalent](https://isovalent.com/blog/post/cilium-1-18/) · [Releases](https://github.com/cilium/cilium/releases)\n\n## IaC\n- **OpenTofu 1.12.2 (June 12) widens the gap with Terraform** — 1.12 adds OCI registry support, native S3 state locking (no DynamoDB table), dynamic `prevent_destroy` wired to a variable, `destroy = false` to drop a resource from state without destroying it, and file-target JSON output — several of these Terraform hasn't shipped. Track the divergence if you maintain shared modules. [InfoQ](https://www.infoq.com/news/2026/05/opentofu-release-terraform/) · [OpenTofu](https://opentofu.org/)\n\n## CI/CD & Build\n- **GitHub Actions defaults to Node 24 (June 2); Node 20 removed Sept 16** — Actions now run on Node 24 by default and Node 20 leaves the runner in September. Bump `using:` in any custom JS actions and re-test third-party actions now to avoid a hard break. Also: Docker updated to 29.5.0 / Buildx 0.34.0 (BuildKit 0.29) in the runner, and `docker sbom` is deprecated in favor of `docker scout sbom`. [GitHub Changelog](https://github.blog/changelog/2025-02-12-notice-of-upcoming-deprecations-and-breaking-changes-for-github-actions/) · [BuildKit](https://github.com/moby/buildkit/releases)\n\n## Cloud compute / cost\n- **AWS Graviton5 M9g / M9gd GA (June)** — 192 Neoverse-V3 cores (Armv9.2-A, 3nm), up to ~25% better compute than M8g, PCIe Gen6, sixth-gen Nitro with a formally verified \"Nitro Isolation Engine.\" Available on EKS — re-run your ARM price/perf math for compute-bound and scheduler-heavy fleets. [AWS](https://www.aboutamazon.com/news/aws/aws-graviton-5-cpu-amazon-ec2) · [InfoQ](https://www.infoq.com/news/2026/01/aws-graviton-m9g/)\n\n## Observability\n- **OTel Collector v0.155.0 (July 4); Prometheus receiver nearing stable** — The Prometheus receiver is slated to be marked stable, letting teams use the Collector as their primary Prometheus scrape gateway without breaking-change risk; Prometheus-side OTLP metrics ingestion remains experimental. [Grafana](https://grafana.com/blog/opentelemetry-and-grafana-labs-whats-new-and-whats-next-in-2026/) · [OTel](https://opentelemetry.io/docs/collector/)\n\n## Worth your weekend\n- Read the JFrog/Hive writeups on the page-cache LPE family (DirtyFrag → DirtyClone → pedit COW): they explain why file-integrity monitors miss these and why unprivileged user namespaces are the common enabler — useful context for a node-hardening pass. [Hive Security](https://hivesecurity.gitlab.io/blog/linux-lpe-pedit-cow-dirtyclone-2026/)\n\n## Heads up\n- **Node 20 removal from GitHub-hosted runners on Sept 16** — a dated breaking change; migrate custom actions before then.\n- **K8s 1.34 → maintenance Aug 27, EOL Oct 27** — schedule the 1.35 upgrade; validate in-place pod resize (GA in 1.35) behavior for stateful workloads.\n\n## Signals worth watching\n- **Unprivileged user namespaces as the recurring container-escape amplifier** — three CVEs this month all get worse with userns enabled. Expect renewed pressure to gate `kernel.unprivileged_userns_clone` and tighten seccomp/AppArmor node defaults.\n- **Managed node-image patch lag vs. control-plane patching** — the Copy Fail K8s PoC underlines that a patched API server doesn't mean patched kernels; watch your provider's node-image (COS/AL2023/Ubuntu) bulletins independently.\n\n## Filtered out\n- Crossplane / Pulumi: no material June 2026 releases surfaced (Crossplane v2 was Aug 2025); comparison content only.\n- Argo CD v3.4.3 (May 28) and Flux v2.8.8 (May 20): just outside the 30-day window, no June breaking changes.\n- Generic \"best IaC/GitOps tool in 2026\" listicles and vendor comparison SEO pages.",

      "md": "**TL;DR** — WWDC 2026 (June 8–9) shipped iOS 27 / Xcode 27 developer betas with App Intents now the mandatory Siri path and on-device AI in Xcode; the one hard clock on the board is Google Play's **Aug 31, 2026** deadline to target Android 16 (API 36). Apple's Xcode 26 / iOS 26 SDK build requirement already went live (April 28), so if you're still shipping you're already on it.\n\n## App Store Policy\n- **Google Play: target Android 16 (API 36) by Aug 31, 2026 — hard block on submissions** — After this date, new apps and updates must target API 36 or the Play Console rejects the upload; laggards also go invisible to new users on newer-OS devices. Budget time for the breaking bits: 16 KB memory-page alignment for native libs, `USE_FULL_SCREEN_INTENT` now gated, and tighter media/file-access. ~8 weeks out. [Play policy](https://support.google.com/googleplay/android-developer/answer/11926878) · [dev docs](https://developer.android.com/google/play/requirements/target-sdk)\n- **Apple's iOS 26 SDK build requirement is live (since Apr 28, 2026)** — Every new App Store Connect submission/update must be built with Xcode 26+ against the iOS/iPadOS/tvOS/watchOS/visionOS 26 SDK. Deployment target can stay as low as iOS 16/17 — this is about the build SDK, not your users' OS. If you're still on older Xcode in CI, that pipeline is already failing. [Apple upcoming requirements](https://developer.apple.com/news/upcoming-requirements/) · [Expo note](https://expo.dev/blog/app-store-connect-minimum-sdk-26)\n\n## Apple / iOS\n- **WWDC 2026: iOS 27 + Xcode 27 developer betas** — App Intents becomes the required way Siri talks to your app (SiriKit is on a deprecation clock), new foldable layout APIs land ahead of the rumored iPhone Fold, and Swift's concurrency model tightens data-isolation guarantees while cutting annotation burden. Beta only — do not ship against it. [Apple Newsroom](https://www.apple.com/newsroom/2026/06/apple-unveils-next-generation-of-apple-intelligence-siri-ai-and-more/) · [TechCrunch recap](https://techcrunch.com/2026/06/09/wwdc-2026-everything-announced-on-siri-ai-os-27-apple-intelligence-and-more/)\n- **Xcode 27 gets on-device AI code completion (routable to third-party models)** — Plus faster simulators, tighter Git integration, and Instruments profiling focused on memory/energy. Beta. [TechRadar liveblog](https://www.techradar.com/news/live/apple-wwdc-2026-live)\n- **Xcode 26.6 is the current stable toolchain (June 25, 2026)** — Bundles the iOS/iPadOS 26.6 beta SDKs; this is the build you should be shipping App Store submissions from today. [Apple releases](https://developer.apple.com/news/releases/?id=06252026a)\n\n## Android / Kotlin\n- **Kotlin 2.4.0 landed (June 2026), alongside Kotlin's 15th anniversary and the new Kotlin Toolchain** — Continues the K2-era cadence; pair with the AGP 9 built-in-Kotlin change below. [JetBrains roundup](https://blog.jetbrains.com/kotlin/2026/06/kodees-kotlin-roundup-kotlin-turns-15-kotlin-2-4-0-and-the-kotlin-toolchain/)\n- **AGP 9.0 enables built-in Kotlin by default — stop applying `kotlin-android`** — You no longer apply `org.jetbrains.kotlin.android`; with Kotlin 2.3+ still applying it now throws a configuration error. The opt-out is removed entirely in AGP 10.0 (mid-2026), so migrate build scripts now. [AGP 9 notes](https://developer.android.com/build/releases/agp-9-0-0-release-notes) · [JetBrains migration](https://blog.jetbrains.com/kotlin/2026/01/update-your-projects-for-agp9/)\n- **Jetpack Compose BOM 2026.06.00 is current; core Compose 1.11 is the stable line** — Standard monthly BOM bump. [Compose/Kotlin map](https://developer.android.com/jetpack/androidx/releases/compose-kotlin)\n\n## Cross-platform\n- **KMP is being positioned as production-ready on Kotlin 2.3** — More reliable iOS memory management, mature Compose Multiplatform, and reportedly up to ~40% faster release builds on iOS-targeting projects; Netflix/Booking.com-class shipping cited. [Android KMP](https://developer.android.com/kotlin/multiplatform)\n- **Flutter 3.44 / Dart 3.12 (late May, Google I/O 2026)** — Impeller is now the default renderer on Android, CocoaPods is retired in favor of SPM, and Material/Cupertino libraries are frozen in-core ahead of moving to standalone packages. Just outside the 30-day window but the current stable you'd adopt. [What's new in 3.44](https://blog.flutter.dev/whats-new-in-flutter-3-44-b0cc1ad3c527) · [Dart 3.12](https://dart.dev/blog/announcing-dart-3-12)\n\n## Security\n- **iOS/iPadOS 26.5.2 emergency update (~July 2, 2026): ~25+ fixes, mostly WebKit** — Apple pulled security fixes out of the 26.6 cycle and shipped them early; patched, so just update. [Apple support](https://support.apple.com/en-us/127594) · [Forbes](https://www.forbes.com/sites/davidphelan/2026/07/02/apples-latest-ios-2652-iphone-update-focuses-on-25-security-patches/)\n- **Android June 2026 bulletin: CVE-2025-48595 under limited, targeted exploitation — patched** — A zero-day fixed at patch level 2026-06-05 across Android 14/15/16. Actively exploited but already patched; confirm your device/build is at the June patch level. [Android bulletin](https://source.android.com/docs/security/bulletin/2026/2026-06-01) · [Forbes](https://www.forbes.com/sites/daveywinder/2026/06/02/new-android-14-15-and-16-update-fixes-actively-exploited-security-flaw/)\n\n## Worth your weekend\n- Audit your Android target SDK now: bump to API 36, then test the 16 KB page-size alignment for any native/NDK libs and the `USE_FULL_SCREEN_INTENT` gate — these are the two things most likely to break silently before the Aug 31 deadline. [dev docs](https://developer.android.com/google/play/requirements/target-sdk)\n- If you own an app with Siri/Shortcuts surfaces, start the SiriKit → App Intents migration against the iOS 27 beta; it's the mandatory path going forward. [TechCrunch](https://techcrunch.com/2026/06/09/wwdc-2026-everything-announced-on-siri-ai-os-27-apple-intelligence-and-more/)\n\n## Heads up\n- **Aug 31, 2026** — Google Play API 36 target requirement (submission-blocking).\n- **AGP 10.0 (mid-2026)** removes the built-in-Kotlin opt-out entirely — migrate build scripts before you're forced to.\n- **React Native 0.82** is New-Architecture-only; 0.81 / Expo SDK 54 were the last Legacy-supporting releases, so plan the Fabric/TurboModules cutover if you haven't. [RN 0.82](https://reactnative.dev/blog/2025/10/08/react-native-0.82)\n\n## Signals worth watching\n- iOS 26.6 stable expected in July (26.5.2 already shipped its security payload early).\n- Xcode 27 on-device AI completion with third-party model routing — watch whether it becomes an expected part of the toolchain before iOS 27 GA this fall.\n- Apple's shift to decoupling security updates from feature releases (AI-driven threat cadence) means more frequent out-of-band patches to track.\n\n## Filtered out\n- Generic \"iOS 27 is here\" consumer coverage with no developer-facing API detail.\n- Older 2026 iOS zero-days (CVE-2025-43529 / CVE-2025-14174, fixed back in iOS 26.2) — outside the 30-day window and already patched.\n- Marketing-heavy KMP \"is it ready\" think-pieces with no primary release data.",

      "md": "**TL;DR** — Quiet 48h after a busy end of June: the freshest engineer-relevant moves are Anthropic tightening China/subsidiary access controls (and quietly walking back covert detection after user pushback), Kimi K2.7 Code landing as the first open-weight model in GitHub Copilot's picker, and Fable 5 fully restored post-export-control. The bigger model drops (Claude Sonnet 5, GPT-5.6 family) are days old and still rolling out.\n\n## Frontier models & pricing\n- **Claude Sonnet 5 — new default, near-Opus at ~⅓ the price (June 30, still landing)** — Model ID `claude-sonnet-5`, 1M-token context, 128K max output, adaptive thinking with selectable effort (low→max/x-high). Intro pricing **$2/M in, $10/M out through Aug 31**, then $3/$15. Note for cost modeling: docs flag a new tokenizer that produces ~30% more tokens for the same text, which offsets some of the headline price cut. Verify against primary docs before repricing. [Anthropic](https://www.anthropic.com/news/claude-sonnet-5) · [pricing docs](https://platform.claude.com/docs/en/about-claude/pricing)\n- **GPT-5.6 family (Sol / Terra / Luna) — gated, not GA (previewed June 26)** — Sol (frontier), Terra (~GPT-5.5-level at roughly half cost), Luna (fast/cheap), plus an \"Ultra/Max\" reasoning mode. Reported to be the first US frontier release gated behind government access — available only via API/Codex to a small set of vetted orgs, with broad public launch delayed pending oversight. Treat availability claims as fluid. [testingcatalog](https://www.testingcatalog.com/openai-might-be-preparing-gpt-5-6-for-next-weeks-release/)\n\n## Coding agents & dev tools\n- **Kimi K2.7 Code GA in GitHub Copilot — first open-weight in the picker (July 1)** — Selectable in the VS Code model picker for Copilot Pro/Pro+/Max, Azure-hosted by GitHub, billed at provider list pricing under usage-based billing; Business/Enterprise to follow. Completes a five-lab roster (OpenAI, Anthropic, Google, Microsoft, Moonshot). Primary source is the GitHub changelog. [GitHub Changelog](https://github.blog/changelog/2026-07-01-kimi-k2-7-is-now-available-in-github-copilot/)\n- **Claude Fable 5 restored across Claude Code / API (July 1)** — Back for paid users after the June 12–30 US export-control suspension. Usage caveat: through ~July 7 you can spend up to 50% of your weekly limit on Fable 5, and it draws down usage faster than Opus 4.8. [CNBC](https://www.cnbc.com/2026/06/30/anthropic-says-trump-admin-has-lifted-export-controls-on-claude-fable-5-and-mythos-5.html)\n\n## Industry moves\n- **Anthropic tightens China access, then walks back covert detection (~July 3–4)** — FT-reported crackdown extends the ToS ban on Chinese entities to majority-owned subsidiaries, closing offshore workarounds (e.g., Singapore-subsidiary corporate accounts, VPN-purchased personal subs). Detection reportedly keyed off signals like device time zones/usage patterns; Anthropic pulled back at least some covert measures after user pushback. Relevant if your org has China-linked corporate structure. [Seeking Alpha/FT](https://seekingalpha.com/news/4609813-anthropic-cracks-down-on-chinese-workaround-access-to-claude-ft-reports) · [BanklessTimes](https://www.banklesstimes.com/articles/2026/07/03/anthropic-moves-to-block-chinese-firms-using-claude-via-offshore-workarounds/)\n\n## Security/safety\n- **MCP ecosystem still the soft underbelly** — No new actively-exploited AI-tool CVE in the 48h window, but the backdrop is ugly: Microsoft (June 30) demoed data exfiltration via poisoned MCP tool descriptions, and 2026 tallies 30+ MCP CVEs including a CVSS 9.8 under active exploitation across MCP Inspector, LiteLLM, Cursor, LibreChat, Windsurf. Audit any auto-installed MCP servers. [CSA](https://labs.cloudsecurityalliance.org/research/csa-research-note-mcp-security-crisis-20260504-csa-styled/) · [OX Security](https://www.ox.security/blog/mcp-supply-chain-advisory-rce-vulnerabilities-across-the-ai-ecosystem/)\n\n## Heads up\n- **Sonnet 5 intro pricing ($2/$10) ends Aug 31** → standard $3/$15. Bake into forecasts. [Anthropic](https://www.anthropic.com/claude/sonnet)\n- **Cursor Teams billing split** (Composer/Auto vs Third-Party API pools; new $120/seat Premium tier) applied to renewals from **July 1**. Check your invoice if you run agents all day.\n- **Fable 5 weekly-usage throttle** through ~July 7 and faster drawdown vs Opus 4.8 — watch your limits if you switched.\n\n## Signals worth watching\n- **Meta's next model, codename \"Watermelon\"** — per a July 2 Business Insider report, Alexandr Wang told a closed briefing it matches GPT-5.5 on current evals using ~10x the compute of Meta's prior frontier model. In training, not shipped — treat as leak/rumor.\n- **Microsoft's $2.5B enterprise-AI push** — a new org embedding ~6,000 staff with customers to accelerate adoption; signals where the enterprise coding-agent budget is heading.\n- **Open-weight momentum in IDEs** — Kimi K2.7 in Copilot plus Zed/JetBrains' Agent Client Protocol (ACP) point to editor-agnostic, multi-model agent wiring as the emerging default.\n\n## Filtered out\n- Google NanoBanana 2 Lite / OmniFlash image+video gen (media, not coding/infra).\n- vLLM/SGLang/llama.cpp: no confirmed new release in the window (latest tracked: vLLM 0.21.0, SGLang 0.5.12 in May; Gemma 4 QAT + Liquid LFM2.5 day-0 support in late June).\n- LangChain v1.3.x point releases and LangSmith Summer AMA (July 9–Aug 12) — no breaking changes.\n- GPU/accelerator and inference-hardware items → deferred to AI Hardware.",

      "md": "**TL;DR** — Quietest signal this month is the strongest: the field is converging on clause-level credit assignment and execution-grounded repair (TAHOE, EXPO-SQL, SOMA-SQL) rather than raw score-chasing, while a VLDB annotation-errors study shows BIRD/Spider leaderboards are partly measuring noise — spend your energy on execution-feedback loops and tribal-knowledge injection, not another Spider fine-tune.\n\n## New research (techniques you can actually apply)\n- **TAHOE: automated hint optimization from experience (arXiv:2606.12387)** — Distills debugging traces into reusable *Syntax Hints* (dialect-specific compiler rules) and *Semantic Hints* (schema/user-specific logic) over a develop→deploy lifecycle, so the system learns from its own errors without SFT. This is the most production-shaped paper of the month: it directly targets strict dialects, huge schemas, and drifting user preferences — the things that break real deployments but never show up on Spider. [arXiv](https://arxiv.org/abs/2606.12387)\n- **SOMA-SQL: resolving multi-source ambiguity via query logs (arXiv:2606.11424)** — Mines your existing enterprise SQL query logs for \"intent anchors,\" then synthesizes ambiguity variants to build reusable supervision for recurring failure patterns. Practical because it turns the artifact every data team already has (query history) into training signal, and attacks the ambiguity/multi-source-join problem that causes silent wrong answers in prod. [arXiv](https://arxiv.org/abs/2606.11424)\n- **EXPO-SQL / CAPER: clause-level reward, not token-level (arXiv:2606.23693 / arXiv:2606.03327)** — Both derive *clause-aligned* supervision (CAPER via counterfactual edits on the SQL AST → 90k+ clause-annotated preference tuples; EXPO-SQL via execution-based clause-level policy optimization), fixing the mismatch where per-token RL penalizes execution-equivalent queries. CAPER reports up to 15.3% relative EX gain over GPT-5.4 and 84.5% failure-localization accuracy — the localization angle is the useful bit if you're building error-triage into a pipeline. [CAPER](https://arxiv.org/abs/2606.03327) · [EXPO-SQL](https://arxiv.org/pdf/2606.23693)\n- **Progress-SQL: progressive rewards for multi-turn refinement (arXiv:2606.06825)** — Reward is defined over the *trajectory* (does the final SQL improve on the first?) via an Oracle-guided Diagnostic Tree that gives clause-level feedback each turn, plus latency and execution-status rewards. Matters if you run iterative self-correction: it rewards recovering from invalid SQL and reaching correctness earlier, not just one-shot accuracy. [arXiv](https://arxiv.org/abs/2606.06825)\n\n## Benchmarks & the production gap\n- **Pervasive Annotation Errors Break Text-to-SQL Benchmarks (arXiv:2601.08778, VLDB 2026, actively updated)** — Measured 52.8% (BIRD Mini-Dev) and 62.8% (Spider 2.0-Snow) annotation-error rates; correcting a BIRD subset shifted 16 leaderboard agents by −7% to +31% and up to ±9 rank positions, and rankings on the corrected set barely correlate with the original (Spearman 0.32). The takeaway for an engineer: a leaderboard delta of a few points is inside the noise floor — don't pick a technique on that basis. [arXiv](https://arxiv.org/abs/2601.08778) · [code](https://github.com/uiuc-kang-lab/text_to_sql_benchmarks)\n- **LiveSQLBench-Large-v1 is the eval to watch for long-context** — ~1K columns / ~54 tables per DB, 480 tasks, ~84K avg prompt tokens, plus \"Business Rule Drift\" for live context-learning. This is far closer to a real warehouse than Spider/BIRD; if your schemas are large, benchmark against this, not toy DBs. [LiveSQLBench](https://livesqlbench.ai/) · [dataset](https://huggingface.co/datasets/birdsql/livesqlbench-large-v1)\n\n## Production patterns & failure modes\n- **Semantic layer vs. raw Text-to-SQL — the failure modes differ, not just the accuracy** — dbt's benchmark (GPT-5.3 Codex 100% / Sonnet 4.6 98.2% on semantic-layer queries vs 84.1% / 90.0% on raw text-to-SQL) frames the real tradeoff: semantic-layer failures are *refusals*; text-to-SQL failures are *confident wrong numbers* (fan-out join explosions, fiscal-calendar confusion, ambiguous metric defs). Vendor-authored (dbt), so treat the exact numbers as directional — but the failure-mode taxonomy is sound and echoed by independent write-ups. [dbt blog](https://docs.getdbt.com/blog/semantic-layer-vs-text-to-sql-2026) · [failure modes](https://tianpan.co/blog/2026-04-10-text-to-sql-failure-modes-production)\n- **BIRD's real-database gap, re-examined (Jun 6)** — Independent walkthrough of why BIRD scores overstate production readiness: the hard part isn't syntactically valid SQL, it's knowing which column means what. Pairs well with the annotation-errors paper. [Beancount.io](https://beancount.io/bean-labs/research-logs/2026/06/06/bird-benchmark-text-to-sql-real-database-gap)\n\n## Tools\n- **Vanna 2.0 (agent rewrite)** — Now an agent framework rather than a RAG-to-SQL library: user-aware identity through every layer, row-level security (queries filtered by user permissions), audit logging, and support for agentic models (Claude 4.5, GPT-5). Connects to Postgres/MySQL/SQLite/Snowflake/BigQuery/Oracle/DuckDB/ClickHouse; local via Ollama. Worth a look if you need per-user access control baked into the NL2SQL path. [Bytebase roundup](https://www.bytebase.com/blog/top-text-to-sql-query-tools/)\n\n## Worth your weekend\nRead **TAHOE** (2606.12387) and **SOMA-SQL** (2606.11424) back-to-back — both convert operational exhaust (debug traces, query logs) into reusable hints/supervision, which is the highest-leverage pattern for an engineer who can't afford to fine-tune. Then skim **Tk-Boost / \"Arming Data Agents with Tribal Knowledge\"** (arXiv:2602.13521, UC Berkeley) — slightly older but it's the cleanest articulation of *correcting agent misconceptions* about columns rather than just restating schema facts, and it's a bolt-on for any existing agent.\n\n## Heads up\nAny internal metric you're tracking on BIRD-Dev or Spider 2.0-Snow is partly noise (50–60% annotation-error rates). Before you ship a technique because it gained 2–3 points, re-run on the corrected subsets from the UIUC repo, or you may be optimizing for mislabeled gold SQL.\n\n## Signals worth watching\n- **Clause-level reward modeling is consolidating** (CAPER, EXPO-SQL, Progress-SQL all June) — token-level RL for SQL is on the way out; expect open Clause-PRM checkpoints next.\n- **Execution-grounded, multi-candidate selection with typed repair** (SIRIUS-SQL, arXiv:2606.01246) — treats runtime error vs timeout vs empty-result as different \"distances from correctness\" instead of one generic fix. The typed-repair idea is worth stealing even if you don't adopt the full stack.\n- **Long-context schema handling maturing** — schema-linking-free approaches vs. pathfinding/graph linking are both being re-litigated as context windows grow; LiveSQLBench-Large is where this gets decided.\n\n## Filtered out\n- Papers lifting Spider/BIRD numbers with no transfer story (multiple SFT-on-Spider entries) — skipped per lens.\n- **dbt / Vanna** exact accuracy figures flagged as vendor-blog claims; failure-mode framing retained, headline numbers not endorsed.\n- Older-but-relevant context (SQLong 2502, \"Death of Schema Linking?\" 2408, Tribal Knowledge 2602, dbt/TianPan blogs Apr 2026) — outside the strict 30-day window; cited only where they frame an in-window item.",

      "md": "**TL;DR** — The past month was defined by memory, not compute: HBM4 pricing settled ~50% above HBM3E (mid-$500s/stack) while SK hynix throttled its HBM4 ramp to chase 90%-margin DDR5, tightening the squeeze that already threatens Rubin's H2 timeline. On the silicon side, MLPerf Training/Inference v6.0 (June 16) showed AMD's MI355X landing within ~5-6% of B200 on FP4, and inference-ASIC startup Etched exited stealth with working first-pass silicon and racks shipping this summer.\n\n## Independent benchmarks (MLPerf v6.0)\n- **MLPerf Training v6.0 lands with record diversity and new MoE workloads** — MLCommons published June 16: 95 systems, 24 orgs, 13 accelerators, plus two new MoE pretraining benchmarks (DeepSeek-V3 671B, GPT-OSS-20B). NVIDIA GB300 NVL72 posted up to 1.6x GB200 on training; treat that as the new Blackwell-Ultra baseline for sizing. [MLCommons](https://mlcommons.org/2026/06/mlperf-training-v6-0-results/)\n- **AMD MI355X closes the gap on FP4 — within 5-6% of B200** — MI355X (MXFP4) came within 5% of B200 (NVFP4) on Llama 2-70B fine-tune and 6% on Llama 3.1-8B pretrain, a 3.5x generational jump over MI300X, plus first multi-node results (64-GPU FLUX.1; OCI 512x MI300X). On inference, MI355X crossed 1M tokens/sec multi-node. This is the first round where AMD is a credible second-source for FP4 training/inference sizing. [AMD](https://www.amd.com/en/blogs/2026/amd-delivers-breakthrough-mlperf-training-6-0-results.html) · [TechPowerUp](https://www.techpowerup.com/347936/amd-instinct-mi355x-gpus-surpass-1m-tokens-sec-in-mlperf-6-0)\n\n## HBM & memory supply\n- **HBM4 pricing settles ~50% above HBM3E** — SK hynix–NVIDIA HBM4 reportedly in the mid-$500s/stack (12-layer >$600), up 50%+ vs HBM3E. Rubin carries 288GB HBM4/GPU; budget memory as a materially larger share of accelerator BOM than in the Hopper/Blackwell era. [TrendForce](https://www.trendforce.com/news/2026/01/28/news-sk-hynix-reportedly-to-supply-about-two-thirds-of-nvidia-hbm4-samsung-targets-early-delivery/)\n- **SK hynix throttles HBM4 ramp to chase DDR5 margins** — Late June: SK hynix slowed HBM4 conversion and redirected capacity to DDR5 (analyst margins near 90%), while Samsung's HBM4 revenue topped $1B in four months and it qualified with NVIDIA/AMD/Google/Amazon/Microsoft/Meta/Broadcom. Net effect: HBM4 supply stays tight and multi-sourced, reinforcing allocation-only ordering for Rubin-class buildouts. [TrendForce](https://www.trendforce.com/news/2026/06/23/news-memory-giants-split-on-hbm4-strategy-samsung-hbm4-sales-reportedly-tops-1b-sk-hynix-slows-ramp/) · [OC3D](https://overclock3d.net/news/memory/sk-hynix-to-prioritise-ddr5-expansion-over-hbm4-in-new-production-push/)\n- **SK hynix drops price caps in long-term agreements** — July 2: SK hynix removed price ceilings in LTAs (diverging from Micron), signaling suppliers expect further upside and are unwilling to lock in. Reserve/committed memory-linked capacity now, or expect to pay spot. [TrendForce](https://www.trendforce.com/news/2026/07/02/news-sk-hynix-reportedly-removes-price-cap-in-memory-long-term-agreements-diverging-from-micron/)\n- **Micron CEO: memory shortage runs through 2027** — With HBM consuming ~3-4x the wafer area per GB and the big three shifting the bulk of capacity to HBM, DRAM contract prices are guided +13-18% Q/Q in Q3 2026. Longer lead times and price on everything memory-adjacent in a cluster BOM. [Tom's Hardware](https://www.tomshardware.com/pc-components/ram/memory-price-surge-begins-to-cool-as-consumers-hit-affordability-limit-ai-demand-still-keeps-dram-and-nand-prices-climbing-through-q3-2026)\n\n## Accelerators & inference silicon\n- **Etched exits stealth with working Sohu silicon, racks this summer** — June 30: transformer/inference ASIC on TSMC N4P, first-pass (A0) success, $800M raised, $1B+ in signed contracts, and expanded support beyond pure transformers (DeepSeek/MoE, Mamba/SSM, Qwen, Llama). First racks ship this summer — the first non-NVIDIA inference ASIC that's shipping rather than roadmap. Independent throughput numbers not yet available; treat perf claims as vendor until MLPerf/third-party data lands. [GlobeNewswire](https://www.globenewswire.com/news-release/2026/06/30/3319922/0/en/etched-emerges-from-stealth-with-working-chip-800m-raised-and-over-1b-in-customer-contracts.html)\n- **SambaNova raising at ~$10B; SN50 ships later in 2026** — June 30: reported $800M-$1B raise at ~$10B valuation, SoftBank as planned first SN50 customer (Japan). Signals the merchant inference-accelerator field is still funded and consolidating after the NVIDIA-Groq licensing deal. [Winbuzzer](https://winbuzzer.com/2026/06/30/sambanova-may-seek-10b-valuation-in-ai-chip-funding-push-xcxwbn/)\n\n## Cloud availability & pricing\n- **B200 on-demand ~$6.5-6.7/GPU-hr, up ~20% YoY; spot deep but scarce** — Neocloud on-demand B200 clusters around $5.50-6.70/GPU-hr (Lambda ~$5.50), AWS Capacity Blocks ~$9.36, with AWS spot occasionally ~$2.70 when available. H200 spans ~$2.60-3.80/hr at value providers. Capacity, not list price, remains the constraint for Blackwell; reserved/Capacity-Block commitments still required for guaranteed access. [getdeploying B200](https://getdeploying.com/gpus/nvidia-b200) · [getdeploying H200](https://getdeploying.com/gpus/nvidia-h200)\n\n## Interconnect\n- **Broadcom Thor Ultra: first 800G UEC-compliant AI NIC** — Ships as a scale-out counter to NVIDIA's stack, pairing with Arista 800G switches for Ethernet-based XPU clusters. Relevant if you're building non-NVLink training fabric; UEC (scale-out) and UALink 2.0 (scale-up, up to 1,024 GPUs) are both maturing as the open alternatives. [Broadcom](https://investors.broadcom.com/news-releases/news-release-details/broadcom-introduces-industrys-first-800g-ai-ethernet-nic) · [Tom's Hardware](https://www.tomshardware.com/tech-industry/ualink-has-nvidias-nvlink-in-the-crosshairs-final-specs-support-up-to-1-024-gpus-with-200-gt-s-bandwidth)\n\n## Power, cooling & density\n- **Rubin normalizes ~190-230kW racks, 800VDC and 100% liquid cooling** — VR200 NVL72 draws ~190-230kW (vs ~120-130kW Blackwell), with Oberon (H2 2026) requiring 100% liquid cooling; 800VDC arrives with 2027 Kyber/Rubin Ultra (~600kW racks). If you're planning on-prem Rubin, facility power/cooling — not GPU allocation — is the gating item. [DCD](https://www.datacenterdynamics.com/en/news/nvidia-prepares-data-center-industry-for-1mw-racks-and-800-volt-dc-power-architectures/)\n\n## Worth your weekend\n- **PD disaggregation is now the default serving pattern** — Prefill/decode split (KV cache handed off over the network) is supported across vLLM, SGLang, TensorRT-LLM, and NVIDIA Dynamo, with a third memory tier (GPU HBM → CPU DRAM → NVMe) via LMCache/Mooncake letting you serve far more concurrent/long-context users per GPU. Worth prototyping before buying more HBM to solve a KV-capacity problem. [Spheron](https://www.spheron.network/blog/nvme-kv-cache-offloading-llm-inference/)\n\n## Heads up\n- **Rubin's H2 timeline remains HBM4-gated** — HBM4 validation, CX8→CX9 networking, higher power, and SK hynix's Q3 ramp slip keep Rubin's schedule at risk; TrendForce still expects Blackwell to be >70% of NVIDIA high-end shipments in 2026. Don't build 2026 capacity plans assuming volume Rubin. [The Register](https://www.theregister.com/2026/04/08/nvidia_supply_chain/)\n\n## Signals worth watching\n- **Rubin CPX (128GB GDDR7, long-context inference) reportedly reshuffled** — CPX targeted 1M+ token context with 30 PFLOPS NVFP4 and 3x attention vs GB300, but reporting suggests its role shifted around the NVIDIA-Groq deal (a Groq-based LPX rack). Unconfirmed — watch GTC/official roadmap before designing around CPX. [NVIDIA](https://nvidianews.nvidia.com/news/nvidia-unveils-rubin-cpx-a-new-class-of-gpu-designed-for-massive-context-inference)\n- **Trainium 4 to add NVLink Fusion for hybrid Trainium-NVIDIA clusters** — Targeted late-2026/2027 with ~288GB and 4x memory BW; NVLink Fusion support would let XPU and NVIDIA GPU coexist in one fabric. Changes the \"all-in on one vendor\" calculus for AWS committers. [Oplexa](https://oplexa.com/amazon-trainium-3-vs-nvidia-blackwell/)\n\n## Filtered out\n- CES/GTC 2026 Rubin/MI400 launch recaps, NVLink Fusion (Computex 2025), and UALink 2.0 spec finalization — outside the 30-day window, context only.\n- Consumer/PC DRAM-price and smartphone-impact angles of the memory crunch — deferred to Database Hardware for the commodity-DRAM/DDR5 detail; this brief owns the HBM and accelerator side.",

    var chipCls=st==="urgent"?"chip urgent":(st==="ok"?"chip ok":"chip");
    var stLabel=st==="urgent"?"⚑ flagged":(st==="ok"?"fresh":(st==="slow"?"slow day":"pending"));
    document.getElementById("eyebrow").innerHTML="<span>"+s.group.toUpperCase()+"</span>"+
      "<span class='chip'>"+meter(s.freq)+" "+s.cadence+"</span>"+
      "<span class='"+chipCls+"'>"+stLabel+"</span>"+
      (s.updated?"<span>updated "+s.updated+"</span>":"");
    var banner = (st==="urgent" && s.flag_reason)
      ? "<div class='flagbanner'><span class='fb-h'>⚑ Why this is flagged — act now</span>"+md2html(s.flag_reason)+"</div>"
      : "";
    document.getElementById("content").innerHTML=banner+md2html(s.md);
    document.querySelectorAll(".nav-item").forEach(function(n){n.classList.toggle("active",n.dataset.id===id);});
    document.querySelectorAll(".schip").forEach(function(n){n.classList.toggle("active",n.dataset.id===id);});
    document.querySelector(".panel").scrollTop=0;
  }
  function dateSlug(){return (B.generated||"").slice(0,10)||"undated";}
  function briefMd(s){
    var parts=["# "+s.name,""];
    var meta=[s.group, s.cadence, (s.status||"pending").toUpperCase()];
    if(s.updated) meta.push("updated "+s.updated);
    parts.push("_"+meta.join(" · ")+"_","");
    if(s.status==="urgent" && s.flag_reason){
      parts.push("> ⚑ **Act now:** "+s.flag_reason.replace(/\n+/g," "),"");
    }
    parts.push(s.md||"_Awaiting first run._");
    return parts.join("\n");
  }
  function flash(btn,msg){var o=btn.dataset.lbl||btn.textContent;btn.dataset.lbl=o;btn.textContent=msg;setTimeout(function(){btn.textContent=o;},1700);}
  function legacyCopy(text){
    try{var ta=document.createElement("textarea");ta.value=text;ta.setAttribute("readonly","");
      ta.style.position="fixed";ta.style.top="-1000px";ta.style.opacity="0";
      document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,text.length);
      var ok=document.execCommand("copy");document.body.removeChild(ta);return ok;}catch(e){return false;}
  }
  // Copy Markdown to clipboard — the reliable path in a sandboxed artifact iframe (paste into Slack/email/doc).
  function copyMd(text,btn){
    var done=function(ok){flash(btn, ok?"✓ copied!":"⚠ copy blocked");};
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){done(true);},function(){done(legacyCopy(text));});
    }else{ done(legacyCopy(text)); }
  }
  // Export HTML with a layered fallback, best → floor:
  // 1) showSaveFilePicker() — a real native "Save As" dialog on click (Chromium; the genuine Ctrl+S).
  // 2) window.open() — opens the page in a new tab (then Ctrl/Cmd+S) where pop-ups are allowed.
  // 3) clipboard — the only thing that works in a locked-down artifact iframe (paste into a .html file).
  // Note: browsers forbid scripts from synthesising Ctrl+S / the Save dialog directly — (1) is the API for it.
  function exportHtml(name,html,btn){
    if(window.showSaveFilePicker){
      window.showSaveFilePicker({suggestedName:name,types:[{description:"HTML file",accept:{"text/html":[".html"]}}]})
        .then(function(h){return h.createWritable();})
        .then(function(w){return Promise.resolve(w.write(html)).then(function(){return w.close();});})
        .then(function(){flash(btn,"✓ saved");})
        .catch(function(e){ if(e&&e.name==="AbortError") return; openOrCopy(html,btn); });
      return;
    }
    openOrCopy(html,btn);
  }
  function openOrCopy(html,btn){
    var url=null; try{ url=URL.createObjectURL(new Blob([html],{type:"text/html;charset=utf-8"})); }catch(e){}
    var win=null; try{ win=window.open(url||"","_blank","noopener"); }catch(e){}
    if(win){ if(!url){ try{win.document.open();win.document.write(html);win.document.close();}catch(e){} } flash(btn,"↗ opened — Ctrl/Cmd+S to save"); }
    else if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(html).then(function(){flash(btn,"✓ HTML copied");},function(){flash(btn, legacyCopy(html)?"✓ HTML copied":"⚠ blocked");});
    } else { flash(btn, legacyCopy(html)?"✓ HTML copied":"⚠ blocked"); }
    if(url) setTimeout(function(){URL.revokeObjectURL(url);},60000);
  }
  var DOC_CSS="body{margin:0;background:#f6f8fa;color:#1a2230;font:16px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,Roboto,sans-serif;-webkit-font-smoothing:antialiased}"
    +"main{max-width:820px;margin:0 auto;padding:40px 22px 80px}"
    +".kick{font:600 12px/1 ui-monospace,Menlo,monospace;letter-spacing:.14em;text-transform:uppercase;color:#0f6f83;margin:0 0 6px}"
    +"h1{font-size:30px;letter-spacing:-.02em;margin:.2em 0 .1em}"
    +".meta{font:12px/1.4 ui-monospace,Menlo,monospace;color:#6b7684;margin:0 0 18px}"
    +"h2{font-size:16px;margin:28px 0 8px;padding-bottom:5px;border-bottom:1px solid #e2e7ee}h3{font-size:14px;margin:18px 0 6px}"
    +"a{color:#0b6b7e;text-decoration:none;border-bottom:1px solid rgba(11,107,126,.35)}a:hover{border-bottom-color:#0b6b7e}"
    +"code{font:.86em ui-monospace,Menlo,monospace;background:#eef1f5;padding:1px 5px;border-radius:4px}"
    +"ul{padding-left:22px}li{margin:5px 0}"
    +"blockquote{margin:12px 0;padding:8px 14px;border-left:3px solid #0f6f83;background:#eef4f6;border-radius:0 6px 6px 0;color:#48566a}"
    +"hr{border:0;border-top:1px solid #d7dee6;margin:34px 0}"
    +".flag{margin:14px 0;padding:12px 16px;border:1px solid #e6b9b3;border-left:4px solid #c0392b;border-radius:8px;background:#fbeeec;color:#5a1e17}"
    +"@media(prefers-color-scheme:dark){body{background:#0f141a;color:#e7edf4}.kick{color:#3fb6cf}.meta{color:#8592a1}h2{border-bottom-color:#232d39}a{color:#3fb6cf;border-bottom-color:rgba(63,182,207,.4)}code{background:#1a222c}blockquote{background:#161d25;border-left-color:#3fb6cf;color:#a3b0c0}hr{border-top-color:#232d39}.flag{background:#2a1512;border-color:#5a2a24;border-left-color:#f0685b;color:#f3c9c4}}";
  function pageHtml(title,inner){
    return "<!doctype html>\n<html lang='en'><head><meta charset='utf-8'>"
      +"<meta name='viewport' content='width=device-width,initial-scale=1'>"
      +"<title>"+esc(title)+"</title><style>"+DOC_CSS+"</style></head><body><main>"+inner+"</main></body></html>";
  }
  function briefSection(s){
    var meta=[s.group,s.cadence,(s.status||"pending").toUpperCase()];
    if(s.updated) meta.push("updated "+s.updated);
    var banner=(s.status==="urgent"&&s.flag_reason)?"<div class='flag'><strong>⚑ Act now — </strong>"+md2html(s.flag_reason)+"</div>":"";
    return "<h1>"+esc(s.name)+"</h1><p class='meta'>"+esc(meta.join(" · "))+"</p>"+banner+"<article>"+md2html(s.md)+"</article>";
  }
  function briefHtml(s){
    return pageHtml(s.name+" — Daily Briefings","<p class='kick'>Daily Briefings · "+esc(B.generated||"")+"</p>"+briefSection(s));
  }
  function allHtml(){
    var done=B.sections.filter(function(s){return s.status&&s.status!=="pending";});
    var head="<p class='kick'>Daily Briefings · "+esc(B.generated||"")+(B.summary?" · "+esc(B.summary):"")+"</p><h1>Daily Briefings</h1>";

    var s=byId[cur]; if(!s) return; exportHtml("briefing-"+s.id+"-"+dateSlug()+".html", briefHtml(s), this);
  });

    exportHtml("daily-briefings-"+dateSlug()+".html", allHtml(), this);
  });
  var root=document.documentElement,tb=document.getElementById("themeBtn"),ti=document.getElementById("themeIcon");
  function sysDark(){return window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches;}
  function curDark(){var t=root.getAttribute("data-theme");return t?t==="dark":sysDark();}
  tb.addEventListener("click",function(){var n=curDark()?"light":"dark";root.setAttribute("data-theme",n);ti.textContent=n==="dark"?"◑":"◐";});
  var first=(urgent[0]||B.sections.filter(function(s){return s.status&&s.status!=="pending";})[0]||B.sections[0]);
  if(first) select(first.id);
})();
